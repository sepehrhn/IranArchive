description: Shot with a war bullet during protests in Borujerd. He was hit by a war bullet from suppressive forces of the Islamic Republic in the left side of his chest on Safa Street, between the Red Crescent building and Taleghani intersection. He died due to severe internal bleeding and lack of immediate access to medical services and ambulance. He was a worker who worked with a Nissan vehicle in the iron market of Borujerd, making a living by transporting iron. He was described as hardworking, kind, and devoted to his family, with a great interest in music and local Luri dance. His body was handed over after four days under pressure and threats, with the family paying 200 million tomans. Father of two children aged 21 and 10, son of Ezzatollah.
