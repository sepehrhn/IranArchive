description: |-
  Shot by Islamic Republic forces in Marvdasht. He was a 29-year-old graduate in industrial electrical engineering who worked in panel beating and tailoring while studying, later continuing tailoring professionally. He also worked at the road administration and then attended maritime courses to work on ships, selling his two new sewing machines to finance these courses. He held health, safety and environmental certificates for petrochemical work and had maritime credentials. Described by relatives as a handsome and responsible young man who always helped his family and friends.

  Shot directly from the front by Iranian state forces outside Police Station No. 11, struck in abdomen by Kalashnikov round


  Died after being shot by agents during the 'Iranian National Revolution'. His mourners chanted slogans against Khamenei and 'I will kill the one who killed my brother'.
