description: |-
  Gurji resident of Isfahan, shot dead with live ammunition by Iranian government forces during protests. Laid to rest on January 15 at Bagh-e Rezvan Cemetery, Block 2, Section 62.

  Injured by a war bullet and died in the hospital on Tuesday.


  Wounded by live ammunition from special forces, doctors believed she would recover, but she was not allowed to receive treatment and was killed with a shot to the head. She was 18 years old.
