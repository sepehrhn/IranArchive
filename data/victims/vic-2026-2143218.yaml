description: Shot by direct sniper fire from Islamic Republic forces in the Masour area of Khorramabad. He was a student who was interested in wrestling. According to family and relatives, he was severely wounded in this incident and died before reaching the hospital - he was never hospitalized and practically never reached medical centers. His body was buried in his birthplace, Zagheh city. Despite no special problems for the burial, authorities demanded 200 million tomans from the family for the delivery of his body.
