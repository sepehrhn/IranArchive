description: Shot by IRGC forces during protests in Qir city with direct gunfire. His body was delivered to the family with threats that they must declare their son was not killed in protests and hold the burial ceremony without gathering. The family initially planned to hold the funeral on Friday but officials refused to deliver the body due to crowds and gatherings. His body was buried around 6 AM Saturday with only his father present and four security officers at Qir cemetery.
