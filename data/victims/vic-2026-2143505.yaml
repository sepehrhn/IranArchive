description: Shot and killed by suppression forces on motorcycles in Tous52. First shot in the leg with a war bullet, fell to the ground, tried to get up using the wall for support with his wounded leg to escape, then killed by a war bullet to the head while suppression motorcycle forces were moving. Had a bodybuilding gym, was a bodybuilder and athlete with national championship titles in bodybuilding. Born in Mashhad, had two children (a son and a daughter). Body was so large it didn't fit in the coffin. Family was not allowed to bury him in Mashhad and had to bury him in a village, also not allowed to hold memorial ceremonies.
