description: Shot directly by suppression forces on Ponak Street in Tehran during the Iranian National Revolution. Originally from Chhregh village in Salmas county, West Azerbaijan province, and resident of Patavir village, but had come to Tehran for work. Was in very difficult financial situation and worked as a Snap driver to support his family, sending part of his income to them. Was the breadwinner of his family and in the last year due to increased rents, couldn't even afford to rent a house and slept in his car at nights.
