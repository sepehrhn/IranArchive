description: |-
  Shot with war bullets by Islamic Republic suppression forces during popular protests in the Saadi neighborhood of Kermanshah. She was an 18-year-old Kurdish woman from Kermanshah. Her body was buried on Friday 26 Dey 1404 (January 16, 2026) in Bagh-e Ferdows cemetery in Kermanshah.

  Shot with live ammunition by Islamic Republic suppression forces during popular protests in Saadi neighborhood


  Killed by IRGC gunfire during public protests. Her body was returned to her family after about a week, and her funeral was held on January 16, 2026, in the 'Baghi Ferdows' cemetery in Kermanshah.
