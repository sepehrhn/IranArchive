  Turkish citizen from Qazvin who was shot in the forehead with pellet gun by government suppression forces during protests on Thursday 18 Dey (January 8, 2026). He fell into a coma and died after eleven days. His body was buried in one of the villages around Qazvin.

  A 27-year-old Turkish citizen from Qazvin, who was injured by direct shotgun fire from repressive government forces during public protests, lost his life. He was injured on Thursday, 18 Dey 1404, by shotgun pellets to the forehead and was transferred to a coma. He ultimately lost his life after eleven days, and his body was buried in one of the villages around Qazvin.
