description: |-
  IT engineer shot directly with war bullet to lung area during suppression of protests in Mashhad. Died in his brother's arms after being shot. His body was transferred to Behesht-e Razvan cemetery on the morning of January 9 and kept in a car until 5 PM due to high number of casualties, then transferred to Behesht-e Reza. Family received the body on Saturday afternoon January 10 and burial ceremony was held that evening.

