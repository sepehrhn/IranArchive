description: |-
  17-year-old student from Kerman and a resident of Isfahan, shot and killed on Friday evening, January 9, 2026, during protests in the city. He was a gifted student preparing to take the national university entrance exam. His body was returned to his family six days later and buried on Thursday, January 15, 2026. Due to pressure and restrictions imposed by security authorities, his family was prevented from holding any funeral ceremony.

  Shot directly by government forces during nationwide protests
