description: |-
  Shot in the head with a war bullet by government forces during public protests on Namjoo Street in Rasht. He had recently returned from Istanbul to travel to Iran. Before his death, he sent a voice message to a close person saying he had waited so long for this day and if he didn't make it, people should celebrate and remember him.

  Shot directly in the head by Islamic Republic suppression forces on Namjou Street


  The tweet is a eulogy for Omid Norouzi, referring to him as 'javid' (immortal/martyred) and stating 'You became immortal, happy. You became free in my place.' This implies he was killed. His age is given as 35.
