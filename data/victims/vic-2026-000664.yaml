description: |-
  Shot with war bullet by government forces during national revolution in Shahrak Moalem neighborhood of Kermanshah. Economics student and professional tanbur player from Yarsan religious minority. Had previously lost her mother and was caring for her younger sister. Buried in her hometown of Karand-e Gharb on January 10, 2026 with traditional Chamari mourning ceremony.

  Shot by live ammunition fired by security forces during protests in the Shahrek Moallem neighborhood


  Shot directly with live ammunition by government forces during the national revolution in the 'Moallem Town' neighborhood. She was a 21-year-old student of economics and a professional tanbur player, and a follower of the Yarsan faith. She was responsible for caring for her younger sister after her mother passed away.
