description: |-
  42-year-old father of three young children, owner of a furniture factory, resident of Tehran. On 18 Dey 1404 during popular protests in Tehran Pars neighborhood, he was severely injured by a bullet to the head. His brother sat beside him to help when he was targeted by two bullets. Both brothers were taken to hospital. Hamid died after 3 days of unconsciousness. Security agencies demanded 1.5 billion tomans from the family to hand over the bodies of the two brothers and forced them to sign a commitment stating the cause of death was 'brain stroke'.

  Shot in neck, shoulder, and lung by security forces while aiding his brother Hamid


  Entrepreneur and known activist in Iran's furniture industry. Shot in the head by Islamic Republic suppression forces during direct gunfire targeting in Tehranpars area of Tehran during national uprising on Friday evening 19 Dey. Severely wounded by bullet to head area, fell into coma, and died after several days of unconsciousness on 21 Dey. Father of two small children. Security institutions demanded 1.5 billion tomans from family for body delivery and forced them to sign commitment declaring cause of death as 'brain stroke'. Mandatory family presence at government rally in Revolution Square was condition for body delivery.
