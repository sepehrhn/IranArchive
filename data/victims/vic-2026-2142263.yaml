description: Elevator installer, shot in the head by regime's repressive forces on the night of Thursday. His body was withheld from family under pressure and forced commitments, handed over early Sunday around 3:00 AM, and buried just two hours later at 5:00 AM without permission for any funeral or mourning ceremony. Buried under security restrictions in Shahbaz city, in the village of Bazneh. Family was denied the right to hold memorial ceremony.
