description: Shot with bullet during protests in Gilan province. Family refused to take him to hospital due to unsafe conditions and security atmosphere, fearing he would be killed in hospital as there were multiple reports of finishing shots being fired at wounded protesters. He was taken home to find treatment but died at home. He was an athlete, described as a modest, calm and well-mannered young person who was noble and beloved, with a life connected to sports, morals and respect for others.
