description: Shot with pellet gun by government forces at close range while helping an injured person at Sharifabad intersection in Shiraz. More than 80 pellets were extracted from his right kidney. The pellet hit his right kidney which had to be removed, he underwent surgery twice with part of his intestines also removed, and his left kidney failed. He was a truck driver who recently owned a spare parts shop. Family was not allowed to see the wound site, only his face, and his funeral was held under restrictions with four security forces present.
