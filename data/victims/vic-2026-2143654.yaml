description: Father of two children, shot in the chest with pellet gun by government forces around 19:30 in Fardis area of Karaj. His body was transferred to Kahrizak after being killed. He was a well-known businessman in Fardis who supported both his own family and elderly parents, known for his good behavior and responsibility. Photo shows him at the grave of Pouya Bakhtiari, a victim of November 2019 protests, indicating he was a protester seeking justice for victims of the freedom movement.
