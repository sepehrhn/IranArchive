description: Shot directly by Islamic Republic agents on Simindastgerd Three-Way Street while attempting to install a flag. He was first threatened with laser targeting, then shot directly in the head after the area became empty. His body remained in custody of security agencies for one week and was returned to his family after payment of a heavy sum. Witnesses reported that anyone attempting to approach his body was beaten or threatened, forcing his friends to leave the scene. His burial ceremony was attended by large crowds despite security threats to prevent public gathering.
