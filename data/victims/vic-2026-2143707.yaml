description: Baloch citizen who was severely beaten by unknown individuals. Found in critical condition on a Tehran street on Friday, January 29, 2026, and died after being taken to hospital. Forensic examination showed death was caused by severe blows to the head with a hard object. Evidence showed he had been severely beaten before death. Son of Ali Mohammad, from Mitgan village in Sarbaz county. Worked as a welder. Left his residence Thursday evening January 28 after receiving a phone call from someone claiming to need him 'for work'. Multiple signs of beating were observed on various parts of his body including head, abdomen, legs and genital areas during burial. Body was buried in his hometown of Sarbaz on Monday February 2, 2026.
