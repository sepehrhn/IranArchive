description: 20-year-old from Virani village in Shandiz district of Binalood county in Razavi Khorasan province. Was arrested on January 8, 2026 (18 Dey 1404) during protests in Mashhad while he had been previously injured. Shot in the legs the same night. His family was kept completely unaware of his detention location, physical condition and fate until dawn of February 9, 2026 (20 Bahman) when a security official contacted them to collect his body. Body was handed over without any official explanation about the cause of death. Evidence shows he died in detention and was in good health before arrest. Reports suggest the possibility of secret execution without trial.
