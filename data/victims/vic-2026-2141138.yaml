description: Shot directly in the chest by Islamic Republic agents in the Khane Isfahan area. Family took him to hospital, but after agents prevented family from entering and hospital claimed no person with these characteristics existed, Abolfazl's body was found after 12 days of searching under a different name in Bagh-e Rezvan Isfahan. His lifeless body was severely swollen and his face had changed, with signs of bruising and scratches and evidence of improper storage in the morgue. He was then transferred to Shiraz and buried.
