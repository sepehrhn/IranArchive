description: Third-semester student at Shahrekord Technical College. Shot with direct fire to the head and neck area during protests at Falakeh Abi (Blue Circle) in Shahrekord. After his death, his family was put under severe pressure by security institutions. His body was only handed over to the family after obtaining a written commitment from his father that a maximum of 10 people would attend the burial ceremony, and the funeral was held at night at 11 PM. In the death certificate issued for Mohammad Reza Alikhani, the cause of death was recorded as 'impact of hard object to head and neck' - a phrase used in similar cases instead of direct reference to gunshot.
