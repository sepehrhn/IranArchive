description: Captain Mahmoud Ghasemi was a well-known captain of Bushehr boats and originally from Bandar Boalakhir. He was killed on the 18th of Dey month. His body was retrieved from the morgue of Ghaem Hospital of Sepah Bushehr after 4 days with threats and intimidation, and was buried in his birthplace. Mahmoud Ghasemi had willed to be remembered as the Lion of Tangassir. He had two daughters.
