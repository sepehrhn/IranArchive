description: Shot with shotgun pellets in the Jaber Ansari neighborhood of Isfahan during the Lion and Sun Revolution of Iran. Multiple pellets hit her waist and heart area, and she died at the scene. Her body was delivered to the family after 7 days delay, and burial was held under strict security restrictions with only about 20 people present at 8 PM in Imamzadeh Shahzadeh Mahmoud cemetery in Dowlatabad, Isfahan. Family was not allowed to hold any further ceremonies after the burial. She was a final-year university student who was supposed to graduate that year.
