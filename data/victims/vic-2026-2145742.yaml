description: Former member of national youth taekwondo team and physical education student. Shot in the head with a bullet in the Razavi Square area of Rasht. According to sources, he had told his companions that day 'I'm going to help people.' Sources say agents pursued him and he was directly shot in the head in a dead-end alley. His body was initially transferred to Rasoul Akram Hospital in Rasht and then to forensic medicine on Friday. Family was asked to pay money to receive the body, which they refused. They were also given a paper to declare that Shayan was a 'Basiji', which the family again rejected. Only parents were allowed to receive the body on Tuesday for burial, with family pledging not to hold any ceremonies. Two days before the 40th day memorial, individuals came to the family home saying 'we didn't know Shayan was a champion' and requested to hold the memorial ceremony themselves. During burial, the taekwondo federation honored his mother with a plaque of appreciation. He had won a silver medal at the Asian Club Cup.
