description: |-
  Engineer from Isfahan. Killed during popular protests on Azar Street in Isfahan by direct gunfire from government forces with war bullets hitting his neck and heart area. According to informed sources, signs of severe beatings including blows from rifle butts were observed on his face and nose area.

  Shot directly by security forces on Azar Street. Witnesses report officers first struck his face with rifle butts, then shot him in the heart and neck


  Killed by a bullet to the forehead. He was the breadwinner of his family and worked as a cabinet installer. His father suffered from severe Alzheimer's, and his brother had passed away due to cancer.
