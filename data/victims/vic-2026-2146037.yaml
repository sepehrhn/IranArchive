disappearance_circumstances: 18-year-old forcibly disappeared on 28 Bahman 1404 (2026-02-17) in the Kianpars coastal area of Ahvaz after attending a memorial ceremony for the martyrs of the Dey month uprising. He was abducted by agents of the terrorist Islamic Republic regime's intelligence service. Witnesses say the mercenaries targeted him after inspecting mobile phones and viewing protest videos, then violently arrested him using two private cars (L90 and Peugeot 206) and transferred him to an unknown location. Since the abduction, no information about his detention location or condition has been released, and his family remains in complete uncertainty and anxiety.
