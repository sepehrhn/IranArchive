description: "Shot with a war bullet from the roof of a police station in Esfarayen. He was a university lecturer and head of Resalat Bank's central branch in Esfarayen. Father of two daughters who had lost his wife to cancer less than a year earlier. Before being taken to the resuscitation room at the hospital, he said his final words: 'Ali Khamenei, shame on you. Look what you've done to these people.' The security chief at the hospital tried to prevent medical treatment after hearing these words, but the medical staff continued their work. He died from severe injuries and blood loss."
