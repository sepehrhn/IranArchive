description: |-
  Shot directly in the head by regime forces while closing her photography studio to protect her daughters. She was an independent woman, photographer with her own studio, and mother of two children. Killed in front of her daughters' eyes while trying to shield them from gunfire. Body was returned to family after three days with serious threats. Funeral held at 5 a.m. with only parents present under heavy security supervision. Family threatened with arrest if they held any ceremony or spoke about her killing. Her daughter's Instagram account was blocked and her children were barred from continuing university education.

  Shot dead by the Iranian regime
