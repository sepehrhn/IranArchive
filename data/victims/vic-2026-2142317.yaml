description: 19-year-old nephew of Amir Teimouri, resident of Falah neighborhood in Tehran who had gone to visit Amir's house in Fardis for a gathering. Killed alongside his uncles Amir and Omid by gunfire from war weapons by Islamic Republic's suppressive forces on Sar-e Canal area of Fardis (main street). Family was pressured and threatened by government forces to receive the bodies and forced to bury them secretly.
