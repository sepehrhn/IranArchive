disappearance_circumstances: |-
  Arrested: ۷ بهمن ۱۴۰۴
  Prison: اوین
  Charges: فعال مدنی|سیاسی|دانشجویی

  این فعال دانشجویی که بابت فعالیت در شبکه‌های مجازی به «اهانت به مقدسات اسلام»، «نشر اکاذیب» و «فعالیت تبلیغی علیه نظام» متهم و به تحمل ۳۷ ماه حبس تعزیری و پرداخت ۱۵ میلیون تومان جزای نقدی محکوم شده بود پیشتر در تاریخ ۳ آبان‌ماه و ۵ آذرماه نیز جهت اجرای حکم خود به زندان اوین منتقل شده بود. مصطفی محمدحسن، زندانی سیاسی و رتبه‌ ۷ کنکور سراسری کارشناسی ارشد امسال که از دانشگاه صنعتی شریف پذیرش گرفته، پس از مرخصی موقت برای طی مراحل ثبت‌نام با مانع‌تراشی تازه‌‌ی قضایی روبه‌رو شده است. او پدر یک کودک خردسال است و غیبتش تبعات معیشتی و عاطفی جدی برای خانواده به‌همراه دارد. این در حالی است که اعاده‌‌ی دادرسی سوم پرونده‌‌ی وی در خرداد ۱۴۰۴ توسط شعبه‌ٔ ۳۹ دیوان عالی کشور پذیرفته و برای رسیدگی به شعبه‌‌ی ۲۱ دادگاه تجدیدنظر انقلاب ارجاع شد؛ اما این شعبه به‌جای ورود ماهوی، با ایراد نسبت به «سرعت پذیرش اعاده‌‌ی سوم» پرونده را با عنوان «رفع ابهام» به دیوان بازگرداند و روندِ قانونی بررسی را متوقف کرد. لازم به ذکر است، اکثر مستندات پرونده، مربوط به فعالیت‌های مجازی و توییت‌های مرتبط با اعتراضات قیام مهسا است؛ در حالی‌که مطابق عفو عمومی ۱۴۰۱ این موارد باید از درجه‌ٔ اعتبار ساقط می‌شدند. با این وجود، نهادهای قضایی همچنان بر همان مستندات تکیه کرده و از رسیدگی عادلانه جلوگیری کرده‌اند. هم‌زمان، پس از اطلاع دستگاه قضایی از اقدام برای ثبت‌نام، به وکیل اعلام شده که در صورت عدم بازگشت فوری به زندان، وثیقه به اجرا گذاشته می‌شود؛ تصمیمی که عملاً امکان ادامه‌ٔ تحصیل در دانشگاه صنعتی شریف را سلب می‌کند و با حق بنیادین آموزش در تعارض است. افزون بر این، تداوم بازداشت دانشجویانی چون مصطفی محمدحسن و ضیا نبوی، ادعای مطرح‌شده از سوی برخی مقام‌های دولتی مبنی بر «نبود هیچ دانشجویی در زندان» را بی‌اعتبار می‌سازد. در نتیجه، نه‌تنها شایستگی علمی و تلاش چشمگیر این زندانی سیاسی نادیده گرفته شده، بلکه نقش او به‌عنوان پدر یک کودک خردسال نیز کاملاً نادیده مانده است؛ وضعیتی که پیامدهای انسانی، اجتماعی و آموزشی سنگینی به‌جا می‌گذارد.
