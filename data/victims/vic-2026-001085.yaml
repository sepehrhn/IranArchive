description: |-
  19-year-old student from Yazd, killed on 19 Bahman. Buried in a highly secured environment in Abadeh. Family was threatened so severely that after a month they still cannot speak to anyone about their daughter and were forced to claim Golsa had a brain tumor

  20-year-old Golsa Sharifi from Abadeh was beaten on the head with a baton in Yazd, suffered a concussion, and died. Her family was told to say that she had a brain tumor.


  Killed in Abadeh, where she was a student. Her mother claimed she had a brain tumor during the funeral, indicating family pressure. Described as an intelligent girl who attended Farzanegan High School in Abadeh.
