description: |-
  Gilak, resident of Rasht and the director of Ezam Company in Rasht, killed after being shot directly by Iranian government forces during public protests in the city. He was struck by live ammunition in the main artery of his leg, causing severe bleeding. Despite his critical condition, he managed to return home and rang the doorbell. His wife immediately transported him to Pars Hospital, but due to the intensity of blood loss, he died shortly after arrival. Authorities told his mother, 'Leave. We will not transfer your son until we take him out of the grave,' a statement understood as a threat and an attempt to exert psychological pressure on the family.

  Shot in the leg artery on Saadi Street, died from severe bleeding despite being taken to Pars Hospital
