description: 30-year-old Kurdish man from Kermanshah, killed during popular protests on January 9, 2026 (19 Dey 1404) in the Maskan neighborhood of Kermanshah. Shot in the thigh area with war bullets by Islamic Republic government suppression forces, severely wounded and died due to severe bleeding. He was married and owned a auto body shop at Maskan intersection. His body was buried on January 11, 2026 (21 Dey 1404) in Behesht Zahra Braymand cemetery in Kermanshah.
