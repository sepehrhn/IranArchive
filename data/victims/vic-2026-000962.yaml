description: |-
  Kurdish 18-year-old auto body repair worker from Azna, Lorestan province. Shot directly by Islamic Republic forces on January 1, 2026 during Azna protests with two bullets. Was in coma for 5 days before dying from severe injuries at Valian Hospital. Authorities refused to return his body and pressured his family to declare him as a Basij member. Only his mother was allowed a few minutes visit during his 4-day ICU stay while government forces banned others from entering his room.

  Shot during Islamic Republic's crackdown on protests


  Killed during protests. Date of death is 15 Dey 1404, which converts to January 5, 2026.
