description: Shot with a war bullet in his side in Shahinshahr. Friend took him to hospital but officials took him from the hospital. Family had no news of him for 8 days, then were told he had died. Body was returned to family after 12 days. His nose and jaw were broken, hair torn from the front of his head in such a way that his parents could barely identify him from other identifying marks. Family is under security pressure. Buried with only 15 people in Ahvaz city.
