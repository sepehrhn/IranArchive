description: |-
  17-year-old boy killed in Fardis, Karaj, on the evening after being shot directly by state forces. The child was struck by a live bullet to the heart. While suffering from severe bleeding, he was beaten, and authorities at the scene prevented people from transferring him to a hospital. He ultimately lost his life due to excessive blood loss. State forces collected all CCTV cameras in the neighborhood on 15th Street in Fardis and pressured the family to attribute his killing to protesters. The child's body was eventually handed over to his family from the Kahrizak Legal Medicine Organization, and he was buried at Behesht-e Sakineh Cemetery in Karaj. He had a strong interest in rap and poetry, and his works reflected notable creativity and artistic talent. He composed his poems himself and recorded them in a small studio inside his room.

  Shot in the heart by Islamic Republic forces during protests. Security forces prevented anyone from helping him for approximately 40 minutes while he was bleeding.


  Shot directly in the heart by Islamic Republic forces in the Fardis area of Karaj. Security forces prevented anyone from helping him for about 40 minutes while he was bleeding, threatening anyone who tried to assist. After the killing, security forces collected and removed all CCTV cameras from homes and shops on 15th Street in Fardis to destroy evidence. He was an aspiring rapper who had built a small recording studio in his bedroom closet and wrote lyrics about his generation's pain.
