description: Shot directly by government forces during popular protests in Khaneh neighborhood of Isfahan, in front of his mother and grandmother. According to relatives' reports, several motorcyclists from suppressive forces chased Pedram Saeedi to near his home and shot him from behind. The bullet hit his heart area and he was severely wounded. He was transferred to hospital but died hours later due to severe injuries. After his death, government agents stole his body from the hospital and his family was left unaware of the body's location. Four days later, Pedram Saeedi's body was found and delivered to the family.
