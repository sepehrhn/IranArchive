description: Car parts shop owner who got into conflict with authorities along with friends. They beat up the officers who then fled. A plainclothes officer tracked them down and found his house and shop. Authorities raided his shop, took all his goods, and beat and arrested him. He was detained for 2-3 days then released on bail with a bruised and battered body. Two days after release, he suffered a heart attack and died, despite having no underlying health conditions. A small ceremony was held for him, and his sisters denied he had been arrested, indicating they had been threatened.
