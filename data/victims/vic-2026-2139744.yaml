description: |-
  Shot in the neck with a military bullet while riding behind her father on a motorcycle. Found in Kahrizak with a hole in her throat. She fell from the motorcycle after being shot and died in her father's arms, unable to speak when trying to say 'dad'.

  Shot with a war bullet in the neck while riding on the back of her father's motorcycle on Friday, 19 Dey. After being shot, she fell off the motorcycle and tried to call out to her father but could not speak due to her throat wound. She died in her father's arms. Her body was later found in Kahrizak.
