description: Shot in the heart by special forces during protests near Farhang Street in Rasht. She was a fourth-grade elementary school teacher and mother of an 8-year-old son. Special forces cornered protesters in an alley and opened fire. Her body was returned to family after signing commitments, with authorities demanding the family declare her a Basij member, which they refused.
