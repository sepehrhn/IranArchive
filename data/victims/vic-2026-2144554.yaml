description: Shot directly by Basij forces in Rostamabad (Gilan). Hit by a bullet at 8:30 AM and also had pellets hit his back. Suffered severe bleeding as they hit his main leg artery. Underwent surgery by a general surgeon at midnight but hospital lacked a vascular surgeon and blood supplies. He regained consciousness at 3 AM asking 'Am I okay, is it over?' but went into a coma three hours later and died at 11:30 AM. He had just opened his own shop two days before his death.
