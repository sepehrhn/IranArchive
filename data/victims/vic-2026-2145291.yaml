description: Trans man shot directly in the head by government forces during protests in Isfahan while being escorted home by a friend. Was transferred to Asgarieh Hospital instead of the intended Saadi Hospital, went missing for a week, and was found to have died from severe injuries near Asgarieh Hospital. Body was later transferred to Bagh-e Razvan cemetery. Was in the process of pursuing gender transition procedures and had an upcoming commission appointment.
