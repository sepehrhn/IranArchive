description: Teacher in lower Mashhad. Shot on the first night of July 9 (18th of Tir). Body was severely mutilated, head missing. Family searched for him until Saturday of the following week. Body was not found in Behesht-e Reza cemetery initially. His name was not among the prisoners. Body was eventually found among unidentified corpses brought from Behesht-e Razvan. Wife identified him by his socks and shoes. Sister was in such shock she refused to accept it was him and wouldn't allow burial for 3-4 days.
