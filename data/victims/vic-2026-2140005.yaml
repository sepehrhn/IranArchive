description: |-
  14-year-old Kurdish Kurmanji child from Khalkhaal in Ardabil province, living in Tehran. Shot directly in the head by suppression forces of the Islamic Republic with war bullets during popular protests at Qaleh Hassan Khan Square in Tehran. His family transported his body the same night after being shot with a private vehicle to the city. His body was buried on 20 Dey 1404 in the cemetery of his birth village Lanbar in Khalkhaal, Ardabil province. He was a child who had been working since age 10 to help his family while studying, but left school in Mehr 1404 and was only working.

  Shot with a war bullet (گلوله جنگی) on Thursday night in Qaleh Hassan Khan area. Family was reportedly threatened not to speak about his death publicly.
