description: |-
  Shot with bullets by suppressive forces during popular uprising in Ayatollah Kashani area of Tehran on 18 Dey. Had a high school diploma and worked in the bakery section of 'Roostar' cafe in Sana shopping center. Was interested in music, including playing kahon and tombak, and regularly did bodybuilding. His body was returned to family after 12 days from Kahrizak. Three bullets hit his body from behind, in the area between neck and waist. Buried in Novizak village in Taleghan county.

  Farhad Amani was arrested on January 8, 2026, in the Punak area of Tehran. 
  He was executed on January 22, 2026, just two weeks after his arrest.


  Arrested on 18 Dey (Jan 8) in Punak, Tehran. Executed in Evin prison on 1 Bahman (Jan 20). Family was not allowed to hold a ceremony. Many arrestees are being executed in silence in prison on charges of 'moharebeh'.
