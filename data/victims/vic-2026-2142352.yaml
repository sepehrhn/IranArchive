description: Baloch female student of biomedical engineering at Azad University of Kerman, daughter of Hossein, from Anbarabad county. Shot in the back by suppressive forces while participating in protests on Bahmanyar Street in Kerman. Died from severity of wounds. Body returned to family on Saturday 20 Dey 1404 from Kerman forensic medicine after family was threatened to remain silent and forced to sign commitment. Buried in her birthplace Anbarabad around 19:30 the same day under security restrictions without public announcement.
