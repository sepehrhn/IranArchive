disappearance_circumstances: Arrested by intelligence forces with two Peugeot Pars vehicles on 2026-01-20 following a memorial ceremony for Ramin Raeesi at Bagh-e Rezvan in Isfahan. After arrest, his home was completely searched and family was told not to look for him. For 15 days no official authority took responsibility for the arrest. Family received no response from daily visits to Dastgerd prison and police intelligence. A lawyer appointed by the prison eventually confirmed he is being held in Dastgerd prison. In recent visit, signs of beatings, severe bruising, bleeding in eye, and electric shock marks were observed on his body. After weeks, his charges and judicial verdict remain unknown.
