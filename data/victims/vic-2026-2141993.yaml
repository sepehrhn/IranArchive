disappearance_circumstances: Shot by regime mercenaries in Fooladshahr, Isfahan. He was a monarchist activist. Father of two young daughters. After his death, his body was taken by car to Shahrekord (his birthplace) to prevent regime forces from stealing it, but at dawn security forces raided, stole the body, and returned it days later. His body was eventually buried at night with only a very small number of family members present. Had a sun and lion tattoo visible on his hand.
