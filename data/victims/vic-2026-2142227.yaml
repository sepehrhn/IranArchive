description: Physical fitness trainer and mountaineer shot in the head by security forces on Bagh Daryacheh Street in Isfahan while her two children were with her. She was severely wounded and her children with help from citizens transported her to Saadi Hospital, which refused to admit her. They then headed to Alzahra Hospital. En route, Basij and security forces stopped the vehicle and fired warning shots trying to force passengers out, but eventually allowed passage. She died before reaching the hospital and her body was transferred to Alzahra morgue. After three days of follow-up by family, her body was handed over with condition of no public ceremony and was buried at night under security force presence in Darche city at Bagh Rezvan cemetery next to her father's grave. Medical examiner's certificate listed cause of death as 'cardiac arrest'.
