disappearance_circumstances: Gilaki citizen from Masjed Hashemi neighborhood in Rasht. Arrested on January 25, 2026 by four people in a Peugeot Pars who came to his home with blindfold and transferred to unknown location. Held for 26 days in IRGC Intelligence detention center under interrogation, torture and severe beatings. IRGC Intelligence agents severely beat him to extract forced confessions. After this period, transferred for two days to diagnostic ward of Lakan Prison in Rasht, where many protesters arrested in Dey 1404 are transferred after security detention centers. After two days, again taken by IRGC Intelligence forces from Lakan Prison and returned to IRGC Intelligence detention center. Concerns increased about continued torture and pressure to extract forced confession, relatives say his life is in danger. Married with a 9-year-old child.
