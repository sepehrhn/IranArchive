description: Shot directly by Islamic Republic forces in the heart and lungs at 50 meters from Bahar Hospital in Shahroud on the evening of 18 Dey. Despite one hour of resuscitation efforts at the hospital, he died and his body was kept in the hospital morgue. After 4 days and despite extensive efforts and severe pressure on his father, his body was finally delivered to his family in Gorgan for burial in Takhshi Mahalleh village. Matin was single, active in packaging work, and had studied architecture. Everything was ready for his migration to Turkey when he was killed by the Islamic Republic.
