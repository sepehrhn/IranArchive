description: |-
  Nurse at Milad Hospital in Isfahan. After his shift at the hospital, while carrying a backpack equipped with first aid supplies and going to help the wounded, he was killed by a gunshot to his side.

  No explicit mention of death, but the phrase 'Javid Nam' (eternal name) suggests he is dead. Context suggests death related to protests.


  Shot and killed by regime forces during the protests. A note found in his backpack read: “By the order of the Shah of Iran, King Reza Pahlavi.”
