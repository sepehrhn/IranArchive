description: 31-year-old Kurdish student from Mahabad killed in Tehran. Body returned to family for 700 million tomans. Security forces and IRGC buried her body themselves in the black bag without allowing family to wash, shroud or conduct proper burial rites. Family only allowed 3 minutes to see her face. IRGC special forces stationed outside family home with vehicles and weapons. Several people arrested during funeral ceremony. Family charged 250 million tomans per bullet. Authorities pressuring families to register their deceased children with government Martyrs Foundation.
