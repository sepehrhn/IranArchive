description: Shot directly in the heart by war bullet from Islamic Republic suppression forces during popular protests. 27-year-old merchant from Chalous who had migrated there with his family several years prior. His parents' origins trace back to Kermanj people from Quchan city in Razavi Khorasan province, and his body was buried in that city. Described by relatives as a calm, oppressed, and unarmed young man who went to the streets only for peaceful protest and solidarity with other citizens.
