description: Shot with war bullet in the side during protests on Rabat Sevom Street in Isfahan. Family took him to Gharazi Hospital but hospital officials said they could not help and sent him home. Suffered severe bleeding until 5 AM and died. Regime authorities did not allow burial of his body in Borojen, so he was buried in Isfahan with many compatriots present. Family was reportedly asked to pay 700 million tomans for the return of his body.
