description: |-
  Father of two daughters aged 17 and 13. Arrested on Thursday night 18 Dey in Afsariyeh neighborhood of Tehran according to friends. Family was kept unaware of his fate for two weeks until Shahid Foundation called to inform them of his death. Shot in the heart. Face was destroyed and daughters were not allowed to see their father's face for the last time.

  Arrested on Thursday, January 8th in Afsariyeh neighborhood of Tehran. Family was informed two weeks later by the Martyr Foundation that he was killed by a shot to the heart. His face was reportedly destroyed.


  Arrested on Thursday night, January 8, 2026, in Afsariyeh district, Tehran. His family was threatened and initially did not want his name released. He was shot in the heart. His face was disfigured, and his daughters were not allowed to see him. His death was confirmed by the Martyrs Foundation after two weeks of no contact.
