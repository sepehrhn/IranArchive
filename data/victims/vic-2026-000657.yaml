description: |-
  Sculptor and resident of Mashhad, married father of two, shot dead by direct gunfire from Iranian government forces during ongoing public protests. Killed by direct fire from a military-grade weapon, identified as a Kalashnikov rifle. Was a prominent sculptor, sculpture instructor, founder of a specialized stone sculpture workshop, and recipient of international artistic awards.

  Shot by regime's repressive forces with direct gunfire during protests


  Shot and killed by Islamic Republic forces during the nationwide uprising. He was a father of two.
