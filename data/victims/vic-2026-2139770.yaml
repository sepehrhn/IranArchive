  15-year-old motorcycle courier and breadwinner for his family, killed by a war bullet to the head fired by Islamic Republic forces in Qaleh Hassan Khan. His body was delivered to the family from Kahrizak after his uncle gave a commitment for silent burial due to not having a father

  Shot in the head by security forces while standing on his street watching the protests. He was with his friend Mohammad Yazdani and both were killed by gunfire at Baharan Square in Shahrqods. His body was buried in Behesht-e Fatemeh cemetery. After the killing, government officials went to his family's home and the family is under severe pressure.
