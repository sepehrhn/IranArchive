description: 19-year-old Baloch man from Mehrestan County in Sistan and Baluchestan Province, died under torture in Intelligence Ministry custody. Father of a six-month-old child, resident of Kont village in Sib and Soran County. Killed as a result of severe torture inflicted by Intelligence Ministry agents. Visible signs of severe physical abuse were found on his body, including fractures and burn marks. Died as a result of intense beatings during detention, with reported injuries including fractures to his mouth, teeth, and legs. Had been arrested on February 17, 2026, in front of a repair shop in Mehrestan.
