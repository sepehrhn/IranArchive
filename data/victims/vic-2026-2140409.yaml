description: Young manager and father of a three-year-old daughter. Despite financial comfort, he was not indifferent to the situation. He came to the street not for bread, but with concern for 'freedom'. On the evening of 18 Dey, in front of the Bandar Abbas broadcasting station, he was the target of direct fire from a war bullet. In his burial permit, the cause of death was stated as 'pellet bullet' while traces of war bullets on his head were evident.
