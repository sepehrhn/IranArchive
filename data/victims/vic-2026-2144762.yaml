description: 21-year-old civil engineering student shot with war bullet in the side during protests on 22 Bahman Street in Shahrood. He was with his brother during the national uprising when shooting began. He was hit by a war bullet in his side before he could take shelter behind a car. His brother took him to Imam Hussein Hospital Shahrood, but the hospital neither provided effective treatment nor allowed his transfer to another hospital. He died several hours later. Family was only able to bury his body in Dizaj Cemetery Shahrood after signing a commitment stating he was a Basiji member.
