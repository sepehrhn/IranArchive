description: |-
  17-year-old student wounded by live ammunition fired by state forces during protests in Tehran, in the Tehranpars neighborhood. He was transferred to Tehranpars Hospital (Sevom Square), where he later succumbed to the severity of his injuries. His body was eventually buried in a cemetery in Karaj. His family, under intense pressure and strict surveillance by government forces, was forced to hold the burial ceremony in silence. He was a successful and talented student, and his family had planned for him to move to Canada to continue his education.

  On January 7, the Islamic regime’s security forces opened fire on 25 children while they were chanting anti-regime slogans. Sina was one of them and died on the way to the hospital.
