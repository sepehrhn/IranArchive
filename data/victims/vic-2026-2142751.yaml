description: Born in Mehr 1367, 37 years old, resident of Marzdaran neighborhood in Tehran, owner of a cabinet-making workshop in Ariashahr. Shot dead by direct fire from suppression forces during protests in Ariashahr district. Was with five friends at protests when one was shot. Returned to help his wounded friend when a sniper affiliated with security forces fired from a building rooftop. Security forces then targeted him with six war bullets, killing him on the spot. About to get married, gave his phone, password and car keys to his mother before leaving home and asked for her forgiveness.
