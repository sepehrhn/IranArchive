description: 27-year-old Kurdish citizen from Malekshahi in Ilam province. Shot in kidney, intestine and thigh by war bullets during protests on Thursday January 8th in Ilam. Died on Saturday January 17th due to deterioration of his physical condition from bullet wounds despite medical efforts. Security agencies demanded 500 million tomans and denial of burial rights in his hometown to return his body to family, or alternatively that family declare him a Basij force killed by protesters. Family was forced to declare him as government force to retrieve body due to financial inability, leading to local residents refusing burial in Malekshahi and boycotting funeral ceremony.
