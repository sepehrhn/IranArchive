description: |-
  Shot in the leg with a military bullet during protests on Selsebil street in Tehran on Friday evening. According to a knowledgeable source, Mohsen had a money exchange business and was married. The bullet that hit his leg was very unusual. The depth and severity of the wound caused by the bullet was such that his body's blood was drained in 15 minutes and he died.

  Shot directly by regime forces, wounded on 18 Dey and died at Madaen Hospital. Death certificate clearly states cause of death as gunshot wound to left leg area


  The tweet is a lament from a parent to a deceased child, Mohsen Jabbarzadeh. The context of the protest is implied by the parent's grief and the engagement metrics, but the specific circumstances and date of death are not provided. The tweet begins with phrases like 'Brother, get up and play with my child again' and 'Get up and give him a toy again', indicating the child is no longer alive.
