description: |-
  Arab citizen shot in the neck by security forces during protests in Golestan neighborhood, Ahvaz on January 8, 2026. He was transferred to Karami Hospital and died the next day due to severity of injuries from blind shooting by security forces. Father of Qasem, owned a fruit shop in Golestan neighborhood, lived in Alavi neighborhood (Hay al-Thawra, Ahmadi Street).

  Arab citizen, also known as Abu Meysaq, son of Qasem, resident of Kooy-e Alavi (Hay al-Thawra, Ahmadi Street) in Ahvaz, owner of a fruit shop in Kooy-e Golestan Ahvaz. Shot in the neck by security forces during protests on the night of January 9, 2026 in Kooy-e Golestan Ahvaz when security forces responded with raids and gunfire against protesters. Was transferred to Karami Hospital in Ahvaz and died the next day due to severity of injuries from indiscriminate shooting by security forces.
