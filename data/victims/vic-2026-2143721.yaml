description: Shot directly by Islamic Republic agents in Pakdasht. Father of two children, was shot in the abdomen during protests on January 8. Family kept him at home for one day but due to deteriorating condition had to transfer him to hospital where he died. He worked in installations and was originally from Rasht but had lived in Pakdasht for years. Family was under pressure from day one, burial ceremony was held with security measures, and due to extreme pressure from government agents on the family, at his 40-day memorial ceremony they introduced him as a Basiji and held a ceremony for him in a mosque where Islamic Republic mercenaries attended.
