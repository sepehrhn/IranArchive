description: Shot by Islamic Republic forces at Hafez Zarafshan intersection in Islamshahr. He was an IT engineer who had previously participated in protests and despite injuries from pellet shots to his leg, back and head, he rejoined the protesters. Witnesses say he tried to stand in front of women and girls during protests to protect them from gunfire. Forces shot him in the chest from close range. He was taken to hospital but died en route due to severe bleeding.
