description: |-
  Shot in the throat with a war bullet by regime suppressive forces. Architecture student, professional mountaineer, and resident of Karaj. Described by friends and family as a kind, well-mannered, and always smiling person. His killing is part of the systematic targeting of Iran's young generation during the national uprising.

  Shot in the neck during protests


  Shot in the neck by security forces during events on 18 Dey in Karaj. He was a final-year architecture student at Ferdows University of Karaj. He was the only child in his family and enjoyed mountaineering. His death was reported on 18 Dey, and his seventh-day ceremony was held jointly with Samaneh Mirzaei.
