description: Shot with war bullet in Felkeh Sevom Tehranpars area during protests on 19 Dey. Initially refused to go to hospital and was taken home by friends after being shot in the thigh. Died one day later in hospital due to excessive bleeding. Was a curtain and decorative jewelry merchant in Tehran bazaar. Had been a medal winner in Kyokushin karate in Asia during his youth. Has a 10-year-old son and 18-year-old daughter.
