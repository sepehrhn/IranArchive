disappearance_circumstances: 31-year-old Gilaki footballer and player for Shahin Khoshkbijar football team, arrested at his residence in Noshar neighborhood of Khoshkbijar city, Gilan. His mobile phone had been confiscated by Iranian regime forces at a checkpoint a few days earlier. Agents came to his home door on 16 Bahman 1404 and took the footballer with them. No official explanation has been provided about the reasons for arrest, charges, or his legal status. He is said to have been transferred to Lakan prison in Rasht.
