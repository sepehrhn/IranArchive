description: Shot in the back during protests in Shahin Shahr, Isfahan. A green laser light was spotted on the crowd, followed by gunfire. The bullet hit his heart. He was taken to Goldis Hospital in Shahin Shahr where he was pronounced dead. His family searched for his body at Bagh-e Rezvan morgue in Isfahan for a week before it was returned to them. He worked at Azharan Steel Company in Isfahan.
