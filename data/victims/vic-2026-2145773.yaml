description: Shot directly by Islamic Republic agents from behind, bullets hitting his waist and head. Friends took him to Imam Reza Hospital in Eslamshahr, but the hospital refused to provide care and his body was transferred by agents to Kahrizak. Family discovered his death through photos shown by the emergency chief after much searching. His body was finally buried on January 11 after extensive follow-ups, after getting confirmation that his killing was blamed on Mossad, and with forced commitments that the crowd would not exceed 50 people, no ceremonies would be held, and no banners or announcements would be made. Buried in Dar al-Salam Eslamshahr, section 27.
