description: Shot by security forces stationed at Tehranpars police station (Rashid police station) in Tehranpars area of Tehran. A war bullet hit his lung area. He was transferred to hospital and underwent surgery but died due to pulmonary embolism. Father of two children, resident of Haft-Houz Narmak. After his death, his body was transferred to Kahrizak legal medicine and family was pressured not to inform the public. Family was not allowed to hold a public burial ceremony and Peyman Dareng was buried without ceremony and in media silence.
