description: 15-year-old Lor student from Kamfirouz, Fars Province, residing in Azna, Lorestan Province. Killed by government forces during popular protests in Azna. Arrested and abducted from protest site on Thursday evening, family informed of his death on Saturday morning by Khorramabad Intelligence Office. Body showed gunshot wounds to head and face, only identifiable by his jacket. Family threatened to declare his death an 'accident' and bury him without ceremony.
