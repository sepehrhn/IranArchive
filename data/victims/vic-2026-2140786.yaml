description: 11-year-old Baloch child shot directly by government forces with a war bullet that hit his chest area during popular protests in Rajaei township of Mashhad. His body was transferred to Behesht Reza cemetery in Mashhad without informing the family and was handed over to the family after four days. He was finally buried on Monday 22 Dey (January 11, 2026) in Dastgerdan cemetery in Mashhad.
