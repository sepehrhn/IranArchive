description: Medical student at Qazvin University of Medical Sciences. Shot with three war bullets by security forces. First bullet hit her abdomen, second bullet hit her heart, third bullet hit her abdomen again. Three security agents stood over her preventing anyone from helping her. Her body was found covered in blood. Security forces confiscated the surveillance video. Family was forced to pay 600 million tomans (200 million per bullet) to receive her body after 6 days. Forced to claim she died in a terrorist attack. Not allowed to bury her in her hometown Takestan, buried in Qazvin without public attendance.
