  Shot with live ammunition by Islamic Republic suppression forces during popular protests


  A 31-year-old citizen from Kangavar, Kermanshah province, was killed in the protests of 19 Dey 1404 in Karaj. Mehrdad had joined the street protests in Gohardasht, Karaj, when he was suddenly targeted from behind with live ammunition.
