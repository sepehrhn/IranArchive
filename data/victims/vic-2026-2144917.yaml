description: Born Dey 74 (December 1995-January 1996). Shot with two war bullets in the lung during protests on 18 Dey. Survived initially but could not walk or flee. Remained alive for 20 minutes after being shot, then his living body was placed in the morgue without allowing any access to his body. Family was notified after several days and body was released to family after demanding 800 million tomans and a box of sweets.
