description: Shot by sniper positioned at Qaleh Hassan Khan district office. The bullet hit his abdomen and passed through his body with great force. Despite severe injury, he managed to get up from the ground. Two other youths carried him to an unknown woman's house who had opened her door to the wounded. The woman gave him two blankets when she saw he was shot. He was so weak he couldn't even move his hand to enter his phone password. The woman called his father and said he was hit by pellets to avoid worrying the family. His father and sister came to take him home. Due to the small entry wound, everyone thought he had been hit by pellets, not knowing the bullet had passed through his body. Hours later, his sister who was a nursing student noticed he was losing consciousness. While trying to revive him, she saw blood gushing heavily from both sides of his body. With anxiety, fear and severe bleeding, they struggled to transfer him to Noor Hospital in Shahriyar, but on the way, in the arms of his older and younger sisters, he took his last breaths. The next morning when the family reached Tehran, his body was not in the morgue. For two full days, family and relatives searched for his body in Kahrizak. Finally his body was found and with great difficulty transferred to their city. There the family faced threats from IRGC forces and were asked to conduct the burial ceremony in silence and at night. Despite these pressures, there is still concern about desecration of his grave, so guards are kept at Alireza's grave from night until morning for fear that the body of this innocent teenager might be desecrated. During those days, Alireza's parents were not present in Tehran due to work issues and only his sisters were with him.
