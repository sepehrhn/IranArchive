description: 17-year-old Kurdish student, originally from Salas-e Babajani in Kermanshah province and a resident of Tehran, shot directly by Iranian government forces during popular protests in the capital. He was a member of the Tehran Youth Premier Football League and a youth football player with Saipa Club. He was also a swimming champion in his age category and active in other sports including wrestling. Family received confirmation of his death on Monday after four days without information about his whereabouts. Family has not yet been allowed to take possession of his body.
