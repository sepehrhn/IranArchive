description: Shot by government forces in Shahrak Andisheh. 21-year-old kickboxing champion and IT student at Semnan University. Mother called him on the evening of 18 Dey but another person answered his phone. When family arrived, they found Alireza unconscious and he died before reaching the hospital. Government forces threatened his family that they would be 'destroyed' if they published news about his killing or spoke to media.
