description: 14-year-old Kurdish child from Kangavar, shot with military bullet from behind by Islamic Republic military-security forces during popular protests in Eslamshahr, Tehran Province. Severely wounded and died several hours after being transferred to hospital. Burial ceremony held on 22 Dey month at Behesht-e Fatemeh cemetery in Salehieh. Was active in wrestling and gymnastics sports and had recently completed a professional hairdressing training course.
