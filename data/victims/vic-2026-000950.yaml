description: |-
  Kurdish citizen from Malekshahi in Ilam province. Shot with three direct war bullets by government forces during popular protests on 18 Dey 1404 in Ilam. He was cornered in a dead-end alley by suppressive forces and shot at. The forces then rode motorcycles over his wounded body and left him at the scene. He died on 27 Dey due to severe injuries from the direct shooting and from the forces running motorcycles over his body.

  Killed during protests (implied from tweet and source)


  Died during protests in Dey 1404 (late Dec 2025 - Jan 2026). Specific date not provided, but Dey 1404 started on December 22, 2025. The post number 902 and the URL ending in 954 suggest this is a later entry in a list, potentially placing it later in Dey.
