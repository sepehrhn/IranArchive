description: Kurdish citizen from Kermanshah who was severely wounded on January 7, 2026 during popular protests in Dizelabad, Kermanshah when government forces of the Islamic Republic shot him with more than 16 pellets to the head and face area. He was transferred to Taleghani Hospital in Kermanshah and after one week in intensive care, he died from the severity of his injuries. He was buried on January 14, 2026 in Tappeh Afshar village cemetery. Security agencies put severe pressure on his family to declare him as a member of the 'government Basij', but the family rejected this request. He was married with two young children and worked as a heavy machinery welder.
