description: |-
  Shot with war ammunition near Basij base in Seydi district (Saba West) of Mashhad. Witnesses report that within seconds, at least 7 people were shot and killed in this incident. He was working as a mechanic and had left school about a year ago to learn a trade and help his family. He was the third child of a working-class family. Security agencies asked the family to introduce him as a 'Basiji' but the family refused this request.

  Shot with two war bullets. He was a mechanic student and breadwinner for his family, from Seyedi neighborhood in Mashhad
