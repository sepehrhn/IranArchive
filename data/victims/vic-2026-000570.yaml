description: |-
  58-year-old retired education employee who fought against the enemy in Sardasht for 36 months during the eight-year war. Shot with war bullets while in a private car in Gohardasht, Karaj on 19 Dey along with Zahra Bani Amerian and Danial Mostafavi. Body was returned to their hometown Sonqor (Kermanshah province) two weeks prior and buried before dawn with security forces present, with no mourning ceremonies allowed.

  Shot by government forces while in personal vehicle during peaceful protests along with his son and wife


  Father of Danial Mostafavi. Killed along with his son and wife when their vehicle was shot by government agents during protests. His body was transferred to Sanqor and buried under heavy security.
