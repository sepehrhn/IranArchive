description: 12-year-old Kurdish Yarsan student from Kermanshah, living in Hashtgerd. Shot with two war bullets to the back and back of the neck by Islamic Republic suppression forces using a Kalashnikov rifle. Killed instantly around 9 PM on Friday evening in the street opposite an intelligence center, in front of the governorate building on Ayatollah Khamenei Boulevard. Security forces had suddenly turned off street lights and launched a widespread attack on protesters when she was shot from behind.
