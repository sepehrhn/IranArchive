description: Shot in the head by a government sniper with war bullets during protests in Fardis, Karaj. He was married and worked repairing mobile phones from age 17, and for the past 5 years owned a mobile phone accessories store in Aladin Passage. His body was returned to his family after they signed commitments not to hold mourning ceremonies and not to publicize his death. He was buried in Behesht Rezvan cemetery in Shahriyar. He was killed one week after his daughter's first birthday.
