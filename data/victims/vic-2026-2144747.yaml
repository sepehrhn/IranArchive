description: Gilak man from the city of Rasht in Gilan Province and a former bodybuilding champion, killed by direct gunfire from Iranian government forces during protests in the city. He was a bodybuilding coach and held a master's degree in sports physiology. Zatparvar began weightlifting at the age of 13 and earned national and international titles in powerlifting and weightlifting between 2011 and 2014. He was the son of Majid Zatparvar, a well-known bodybuilding coach and former champion.
