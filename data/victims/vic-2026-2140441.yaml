description: 27-year-old truck driver from Qazvin was killed with war bullets while honking his horn during protests in Neyshabur. He was transporting cargo from Qazvin to Mashhad when he encountered crowds in Neyshabur. Citizens asked him to honk his horn and he did, but was immediately targeted with direct fire from war bullets. The bullet hit his heart, causing his death.
