description: |-
  Shot directly in the mouth by IRGC forces in the Danali area of Rasht. After his death, authorities demanded a large sum of money from the family to release his body. The family could not afford the payment and were told they could declare Amir a 'Basij member' and refrain from speaking publicly about his killing. After receiving his body and regaining internet access, his relatives shared the truth about his killing.

  Shot by Islamic Republic forces in Moallem Street, Rasht. The cause of death was officially recorded as 'gunshot wound'.


  Shot in the mouth with live ammunition by security forces near Danay Ali mausoleum. His death was officially recorded as 'bullet impact'.
