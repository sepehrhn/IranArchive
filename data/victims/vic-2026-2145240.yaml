description: Shot and killed while trying to save a middle-aged woman during protests in Ariashahr area of Tehran on the evening of 18 Dey. He was running when he saw a tear gas canister fall in front of a woman, turned back to pick it up and throw it toward government forces, and was immediately shot directly and killed. His body was initially taken to Ibn Sina Hospital in Ariashahr. Family searched for six days in various centers including Kahrizak morgue before finding his body at police morgue. Initially registered as 'rioter' with requirement for night burial, but family obtained body after giving commitments that he would be declared a 'passerby', no ceremony would be held, and burial would be in silence.
