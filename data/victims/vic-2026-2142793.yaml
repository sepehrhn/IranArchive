description: Shot directly by Islamic Republic agents in the Piroozi area of Tehran, in front of his younger brother's eyes. Family was pressured to declare him a Basiji member, with officials from Pezeshkian's office contacting them directly with substantial promises, which the family refused. After finding the body in the women's warehouse, authorities demanded 800 million for body release. Father refused to pay or take the body, saying it was enough proof that he was killed under Khamenei's crimes. Two days later, one of the father's friends paid 200 million to retrieve the body.
