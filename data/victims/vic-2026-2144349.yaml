description: Arrested during Dey month 1404 protests in Jannat Abad and severely beaten. Was on a bus when people near Sadeghieh stopped it and freed everyone. Returned home and stayed for several days, had seizures multiple times, and died after the final seizure. Hospital forced family to sign that cause of death was drug interaction. Father states death was due to head injuries and tear gas, as she was healthy before. Family was under pressure and forced to sign that they had no complaints and it was drug interaction.
