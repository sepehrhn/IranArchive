description: 35-year-old protester from Mashhad who died under torture after more than one month of detention. He was arrested on 22 Dey 1404 (2026-01-12) during nationwide protests in Mashhad. After more than a month in prison, he died as a result of torture. Intelligence agents arrested him by raiding his home. After more than a month, authorities contacted his family saying he was in a coma at Velayat Hospital. When the family visited the hospital, they found his physical condition was very critical and both his hands were broken. His death was announced to his family on the first of Esfand. His body was buried on Saturday, 2 Esfand at Behesht-e Reza cemetery in Mashhad.
