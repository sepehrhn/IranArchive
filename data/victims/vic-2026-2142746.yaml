description: 17-year-old volleyball player and member of Setaregan Alborz team in Karaj. Shot directly by Islamic Republic suppression forces in the lung area during protests at Mosbah intersection in Karaj. He was with his family during protests but got separated in the crowd and disappeared. His body was found hours later at a clinic. Family was forced to pay heavy costs to receive his body and buried him under security restrictions in Hajiabad cemetery in Karaj.
