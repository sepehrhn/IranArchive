description: 30-year-old Kurdish man shot with shotgun pellets to the abdomen at close range by Islamic Republic suppression forces during protests in the Pardis area of Kermanshah. His body was identified by family at the forensic medicine center among many other protest victims after several days of searching. Family was pressured by security agencies and the body was only released with written commitment for quiet burial without publicity. Buried on 22 Dey 1404 (January 12, 2026) in Breymound cemetery in Kermanshah.
