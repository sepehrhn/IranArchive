description: |-
  Shot by security forces during protests on January 9, 2026 around 10 PM at Kaj Square in Saadat Abad, Tehran. The bullet hit the back of his shoulder. He was the second child of his family, originally from Ahvaz but living in West Tehran. He was unmarried and worked as a barista at a cafe and part-time at a real estate office. He had diabetes from birth and used insulin. His body was buried in Behesht Zahra cemetery, section 211, row 23, number 11. The family was not allowed to have a separate grave for him and he was buried in the family's three-story grave, on the top floor belonging to his grandfather.

  Shot with live ammunition during protests - two bullets hit him and he died at the scene. He was an unarmed protester.


  Killed by direct fire from two live bullets from government forces during public protests. His body was returned the next day and buried in Lavasan. Shahab had said before attending the protests: 'Either everything changes, or I die.'
