description: Baloch citizen killed under torture by intelligence officers in Mehrestan intelligence detention center. Arrested on Tuesday 28 Bahman in front of a repair shop in Mehrestan city and transferred to intelligence detention center. Father of a six-month-old child from Kant village in Sib va Suran county. Body showed signs of fractures and burns, with reported fractures to mouth, teeth and legs from severe beatings during detention. Family was called and threatened before body was handed over.
