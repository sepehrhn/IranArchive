  Persian Name: مرتضی جهانگیری

  Killed during protests.

  Shot with one bullet right under his throat during protests. His friends reported he said I'm suffocating after being shot. He was taken to Dezful hospital and later his body was moved to Ahvaz. His family searched for his body from Friday night until Sunday at 8 PM. Authorities arranged for the body's return between 12 AM and 5 AM for direct burial, preventing a viewing or farewell.
