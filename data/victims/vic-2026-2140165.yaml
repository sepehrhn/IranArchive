description: |-
  Shot with war bullet while going to help her 16-year-old son who had been wounded with pellets in the leg during protests. Authorities demanded a large sum of money to release her body and refused to allow burial in her city of residence, forcing family to bury her in another city. Her husband had died a few years earlier.

  Mother of approximately 45 years old who was killed with a war bullet after going to help her 16-year-old son who had been shot in the leg with pellets during protests. Authorities demanded a large sum of money to release her body and did not allow her to be buried in her city of residence, forcing relatives to take her to another town. Her husband had died several years earlier. Her injured son remained in hiding with his brother due to fear of arrest and did not go to hospital.
