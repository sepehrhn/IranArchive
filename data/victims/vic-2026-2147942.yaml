  Arrested: 29 دی ۱۴۰۴
  Charges: نامشخص

  برادرش هم بازداشت شده. (نعمت حیدری) نرگس حیدری یک مربی بدنسازی و فیتنس ۳۷ ساله (متولد ۱۳۶۷)، متأهل و دارای یک فرزند، ساکن ایذه (استان خوزستان) است. او روز دوشنبه ۲۹ دی‌ماه ۱۴۰۴ (۱۹ ژانویه ۲۰۲۶) حوالی ساعت ۱۴، پس از پایان کار در باشگاه، در مسیر بازگشت به خانه (حدفاصل هلال‌احمر تا مصلی شهر ایذه) توسط نیروهای اطلاعات سپاه پاسداران بازداشت شده و به مکان نامعلومی منتقل شده است. این بازداشت بدون حکم قضایی و همراه با خشونت بوده و تاکنون (با گذشت بیش از ۱۰ روز) هیچ اطلاعی از وضعیت، محل نگهداری یا اتهامات او در دست نیست.
