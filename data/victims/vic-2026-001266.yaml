description: |-
  Father of Kian, died leaving behind a young son who misses him deeply. The child goes to his father's car and kisses the steering wheel, looks at his father's photos one by one at night and cries. When visiting the grave, the child asks to be left alone with his father.

  Persian Name: کمیل جمشیدی

  Shot in the neck by IRGC forces during protests. He said 'I want to go out tonight, if something happens to me, don't let my name sleep. Let everyone know I was martyred' on Thursday before he died.
