description: |-
  Kurdish youth from Gilan-e Gharb (Gihelan) shot by IRGC forces with a war bullet in the upper right kidney area at 11 PM during protests on 19 Dey. Transferred to surgery by his mother, was in operating room until 5 AM on 20 Dey. Family found his body among hundreds of corpses wrapped in black bags at Kahrizak Tehran and had to pay 700 million tomans to retrieve his body

  Shot by IRGC forces with a war bullet in the upper right kidney area during protests at 11 PM, taken to hospital for surgery until 5 AM, body later found among hundreds of corpses in Kahrizak, Tehran


  Killed by direct fire from the Islamic Republic's military-security forces during the suppression of public protests. His family was forced to pay 700 million Toman for the body, which was then buried in his hometown.
