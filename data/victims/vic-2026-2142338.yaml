description: Shot in the side during protests in Khorramabad, Lorestan. Died from severe bleeding while being transported to hospital. Security officials tried to present him as a 'martyred Basij member' which the family rejected. Family was asked to pay 300 million tomans for the body's return, which they couldn't afford. He was buried at 5 AM under security measures at the end of Sarab-yas cemetery in Khorramabad with only his parents present. He was a plumber with two daughters aged 6 and 13, and his wife is pregnant.
