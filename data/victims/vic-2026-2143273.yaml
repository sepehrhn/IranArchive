description: 16-year-old arrested on charges of leadership. Family searched for him for 4 days starting from 19 Dey. On the 5th day his arrest code was suddenly deleted from the system, and on the 6th day his body was found in Kahrizak. The body showed traces of knife wounds that had been repaired with metal clamps. He was a wrestler who had a national competition on the Thursday he was buried but could never wear his newly bought wrestling shoes.
