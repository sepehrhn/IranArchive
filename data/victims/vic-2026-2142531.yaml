description: Young footballer and resident of West Baghestan, Karaj. Shot directly with war bullets by Islamic Republic security forces during protests. Shot in the abdomen in the Shahin Karaj area near 10th Street. Was alive when transferred to Alborz Hospital in Karaj but died due to delays and lack of timely medical care from severe bleeding. Was unarmed and participated peacefully in protests demanding freedom, human dignity and end of Islamic Republic rule. Security forces pressured his family to prevent public disclosure and media interviews.
