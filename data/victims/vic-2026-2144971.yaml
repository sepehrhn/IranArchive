description: 16-year-old Kurdish teenager from Kermanshah was shot by suppression forces with a war bullet during public protests on the evening of January 8th while chanting 'Death to Khamenei' in the Maskan area. Despite severe bleeding, he was arrested and plainclothes forces took his bloodied body in their vehicle. He died en route and the plainclothes forces abandoned his body by the roadside. After his killing, his family was threatened and pressured by security institutions and the IRGC, and threatened that his 10-year-old brother would be arrested.
