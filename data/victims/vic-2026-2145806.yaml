description: 17-year-old Gilak child shot directly by Iranian regime forces at Sargol Square in Rasht while returning home from work around 8:30 PM. Hit in the head by sniper positioned on top of a building and severely wounded. Transferred to Aria Hospital but after four days in coma, security forces removed her body from hospital and transferred it to forensic medicine. Body was returned to family under heavy security pressure with commitments not to hold mourning ceremonies or post announcements. Family was forced to bury her at 11 PM in limited manner in villages around Fouman.
