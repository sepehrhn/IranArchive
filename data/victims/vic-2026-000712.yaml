description: |-
  Father, resident of Najafabad neighborhood in Tehran. Killed by direct shooting from government forces and hit by war bullet during popular protests. When he saw police officers from Najafabad police station shooting at people from inside the station, he moved with a fire truck towards the entrance of the station to protect protesters. More than 11 bullets hit his body and he died on the spot.

  Shot with more than 11 bullets while using a fire truck to shield protesters from police gunfire at Police Station 12
