description: |-
  Shot directly by government suppression forces during protests. Shot in the head with a war bullet, transferred to hospital, and his body was delivered to his family in Kahrizak, Tehran after 24 hours. Worked in the bazaar in perfume and cologne trade.

  Shot in the head by security forces during protests on 19 Dey (January 9), taken to Loghman Hospital, died 24 hours later. Body delivered to family in Kahrizak


  Killed by live ammunition fired by security forces during protests on Thursday, 18 Dey 1404. The bullet hit Amir in the neck. He was buried in section 327, row 183, plot 123 of Behesht-e Zahra cemetery in Tehran.
