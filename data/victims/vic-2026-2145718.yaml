description: Hairdresser who participated in protests on January 9, 2026 in Bandar Anzali but never returned home. His body was returned to his family 34 days later showing severe signs of torture. The official date of death was given as December 29, 2025, though he left home to join protests on January 9, 2026. His body showed extensive injuries and severe beatings throughout, with part of his skull crushed. There was bruising on his face and around his eyes, abnormal condition and bruising of his hands indicating they were broken, and tears visible in his stomach area. His mother was threatened by security and judicial officials to either accept the body or have him buried as an unidentified person.
