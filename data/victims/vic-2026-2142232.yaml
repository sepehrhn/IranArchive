description: 21-year-old Baloch citizen killed during popular protests in Bandar Abbas by direct shooting of war bullet by military and security forces to the head area. Son of Mohammad Youssef, from Zahedan and resident of Bandar Abbas. Body was delivered to family from Khalij Fars Hospital and buried on 22 Dey (January 12) in Mohammad Rasool Allah cemetery in Zahedan. This is the third Baloch victim in the nationwide 1404 protests.
