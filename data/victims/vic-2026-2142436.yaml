description: 21-year-old only child of his family, died in custody after arrest by security forces. He had taken shelter in a residential house with several others when a neighbor reported their location. Security forces arrested everyone present. Family was told not to worry and that he would be released in the morning, but the next morning his body was found beside one of Tehran's highways in the Imam Ali highway area. Death occurred after arrest and while in custody of security forces.
