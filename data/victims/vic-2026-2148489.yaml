  بر اساس جستجوهای انجام‌شده در وب و پلتفرم X (توییتر سابق)، سپهر کوشکباغی (Sepehr Koushkbaghi) یک شهروند بهائی ۳۱ ساله ساکن مشهد است. او در صبح روز یکشنبه ۲۱ دی‌ماه ۱۴۰۴ (۱۱ ژانویه ۲۰۲۶) توسط مأموران وزارت اطلاعات در منزل یکی از دوستانش بازداشت شده و پس از بازجویی به زندان وکیل‌آباد مشهد منتقل شده است
