description: 45-year-old protester, married and father of two children. Joined protests in Mashhad with his friends on 18 Dey 1404. Went missing during clashes between protesters and security forces in the '7 Tir' area of Mashhad. After 5 days missing, his family found his body in 'Behesht Reza' cemetery in Mashhad, with signs of beating on his body and a bullet in his side.
