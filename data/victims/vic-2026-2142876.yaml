description: Shot directly in the head by Islamic Republic agents while helping an injured person. After resisting tear gas and pellet shots, he was targeted with direct shots to the head. His body was not delivered to the family for several days and after obtaining a commitment, was buried without washing and shroud. After his killing, security forces in Yengabad (around Rey county) pressured the family for forced confession by threatening to exhume the grave and tear down banners, forcing the family to guard his grave to prevent exhumation.
