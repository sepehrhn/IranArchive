description: 33-year-old Kurdish citizen from Kermanshah, resident of Daredarez neighborhood. Shot with live ammunition by Islamic Republic suppression forces during evening protests in Daredarez neighborhood. His body was handed over to family after extensive follow-ups on Saturday 20 Dey 1404 (January 10, 2026) and buried on Sunday 21 Dey 1404 (January 11, 2026) in Anjirbane Avarehali village cemetery in Sarpol-e Zahab. He was married and father of two daughters.
