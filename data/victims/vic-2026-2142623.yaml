description: Shot by government forces during protests in Khane area of Isfahan on January 8, 2026. Hit by bullets in the right side and kidney, causing severe internal bleeding. Due to security conditions that night and inability to transport immediately to medical centers, friends carried him on foot to his home after several hours. He died around 1 AM in his brother's arms. Had only two months left of military service. Was a former player for Sepahan football club youth teams and had been actively playing football until about 5-6 months prior.
