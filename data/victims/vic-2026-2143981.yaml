description: Shot directly in the neck artery by Islamic Republic forces while opening her door to rescue two young men who were being beaten in the alley. Her body was buried after 4 days under security measures without permission for viewing, after obtaining commitments from the family. Mother of two children aged 8 and 16. Writer and literature specialist who wrote short stories and cared about Iran and children. According to those around her, she had a very attractive writing style and was brave and fearless.
