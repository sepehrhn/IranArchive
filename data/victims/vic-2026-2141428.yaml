description: Shot with Kalashnikov rifle in the thigh area at 11 PM on the 19th of Dey month in front of Police Station 13 in Jooy-e Abad, Isfahan. The bullet exited from the other side. People took him to a health center but he died due to severe bleeding. Originally from Bakhtiari ethnicity and residing in Jooy-e Abad. His body was handed over to the family under forced signing of a Basij document. Burial was held under security measures with change of mosque location.
