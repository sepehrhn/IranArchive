  Commemorated as a martyr in Hamadan during 2022-2023 protests, mentioned in context of his child's emotional testimony

  Shot in the chest by Islamic Republic suppression forces during the Iranian national revolution. His family searched for his body in Kahrizak for two days. He was buried in Asadabad, Hamedan.


  Shot in the heart during protests. He was a basketball coach, a university basketball champion, a master's student in sports physiology, a business owner, and had a three-year-old son named Avesh. His body was held in Kahrizak for two days before being returned to his hometown of Asadabad for burial. He died 12 days after his 43rd birthday.
