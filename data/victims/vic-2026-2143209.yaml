description: Shot in the throat by regime suppressive forces directly in front of his workplace at Nagin Shopping Center, Phase 3 Andisheh, after closing his shop on the evening of 19 Dey 1404. He immediately fell into a coma and after several days of struggling with death, died on 27 Dey. His body was buried in his birthplace Qaem-shahr. He was a young man full of hope and dreams, and his only 'crime' was being present on the street during the national uprising of the Iranian people.
