description: Shot directly with a war bullet from behind around 8:00 PM in Narmak neighborhood of Tehran. He was a motorcycle mechanic from Sabzevar living in Tehran. After being shot, he managed to get himself to Ansar Hospital in Tehran alone, but died around 11:00 PM the same night due to severe bleeding, neglect of his condition, and lack of effective medical care. His family was not allowed to hold ceremonies or even put up banners. His body was ultimately buried in Karab village, part of Sabzevar county.
