  بر اساس گزارش‌های رسیده به #خبرنامه_امیرکبیر، سعید علیزاده، دانشجوی مقطع کارشناسی‌ارشد رشته معماری دانشگاه بین‌المللی قزوین، روز ۲۲ دی‌ماه با هجوم نیروهای امنیتی به منزل شخصی‌اش در تهران بازداشت شده است. طبق اطلاعات موجود، این دانشجو اهل اردبیل است و به‌تازگی از پایان‌نامه کارشناسی‌ارشد خود دفاع کرده بود. گزارش‌ها حاکی است که سعید علیزاده هم‌اکنون در شرایط نامناسب در زندان فشافویه نگهداری می‌شود.
