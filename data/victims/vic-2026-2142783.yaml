description: Turkish child, computer student and provincial swimming champion originally from Zanjan and residing in Karaj, was shot at close range by Iranian government forces in the Azimiyeh district on Thursday, January 8. He suffered severe head injuries and died after being transferred to hospital. Authorities returned his son's body only after demanding 180 million tomans as a 'bullet fee.' The family was also threatened and warned not to publicize Sam's death or hold any public memorial. Only one week had passed since Sam's 17th birthday. Sam was studying information technology, held a B1 German language certificate, and was planning to move to Germany next year to continue his education.
