description: |-
  Shot with three live bullets by regime's repressive forces during protests in Yazdanshahr. He was a hardware tools shopkeeper who lived in northern regions of Iran and had traveled to Isfahan to visit his mother when he was targeted and killed during the protests.

  Killed during protests in Yazdanshahr, Isfahan


  Killed by live ammunition fired by government forces. One bullet hit the back of his thigh, and two other bullets struck his right and left sides. The severity of the injuries from this shooting led to his death.
