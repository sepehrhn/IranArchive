description: |-
  Shot during protests on Bayat Street in Rey city by direct bullet impact from Islamic Republic armed forces to his side. He was self-employed and on the verge of marriage. His father was a chemical weapons victim from Iran-Iraq war who had died the previous year. Government institutions asked his family to accept that Amir was part of Basij forces, a request that was strongly opposed by Amir's uncle. His family was pressured regarding information sharing. He was buried on Sunday 21 Dey 1404 in Ibn Babuyeh cemetery in Rey city.

