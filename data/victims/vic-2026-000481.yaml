description: |-
  Former political prisoner shot directly in the chest by suppressive forces on Eram Street in Fardis, Karaj while intervening to save a young couple. He was killed instantly at the scene. He had previously been arrested on September 21, 2022 (30 Shahrivar 1401) during nationwide protests following the murder of Mahsa Amini and had spent time in prison.

  Shot in the chest by the Islamic regime while trying to protect a young couple in danger, killed on the spot


  Shot in the chest and killed. Described as a former political prisoner who knew he might not survive and was fighting for his people, Mahsa Amini, Nika Shakarami, and Iran.
