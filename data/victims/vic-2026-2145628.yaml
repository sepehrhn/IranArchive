description: Nurse at Aram Hospital, killed by direct gunfire from government repressive forces during protests. Shot from behind while attempting to help another woman who was being beaten by repressive forces. Died after sustaining severe injuries caused by a live bullet that struck her spleen. Authorities prevented her burial in the city's main cemetery, and her body was buried on Tuesday, January 13, after payment of fees, in cemeteries on the outskirts of the city. Was married and mother of two children. Her third- and seventh-day memorial ceremonies were held simultaneously on Wednesday, January 14
