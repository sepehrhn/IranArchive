description: |-
  Turkish citizen from Bojnurd, high school diploma, restaurant worker and resident of Tehran. Killed by direct shooting from Iranian government forces during popular protests in Sadeghieh area of Tehran. Government institutions demanded about one billion tomans for delivering his body, which the family had to provide by borrowing and getting help from acquaintances. His body was buried under strict security measures.

  Shot in the legs by government forces on January 9, developed sepsis leading to brain death, died from complications
