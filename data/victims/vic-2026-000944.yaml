description: |-
  From Banganjav village, killed after being shot by Iranian government forces during the protests. Body was buried on Saturday, January 10, 2026, in his hometown

  Killed during protests


  A 34-year-old Kurdish citizen, Javad Niazi, was injured by a bullet to the leg by the IRGC during public protests in Islamabad-e Gharb, Kermanshah Province on 18 Dey 1404. He died after being transferred to the hospital due to severe bleeding. His body was buried on 20 Dey in the village of 'Ban Ganjab'.
