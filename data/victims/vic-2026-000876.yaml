description: |-
  Kurdish hairdresser from Tehransar neighborhood who had married about two years prior. Shot by security forces from behind the head and heart area during protests around 22:30 in front of her brother's eyes. Her family found her body among many others at Kahrizak forensic medicine center three days later. Buried on January 14, 2026 in section 71 of Behesht Zahra cemetery in Tehran.

  Killed by a direct shot to the head and chest during protests in Tehran.


  Killed by shooting by the security forces of the Islamic Republic during the popular protests in Tehran.
