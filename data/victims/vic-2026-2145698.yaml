description: 30-year-old electrical engineer and resident of Qeshm Island, shot from behind by Islamic Republic forces while unarmed during suppression of popular protests. He was an ordinary citizen living a simple and peaceful life, interested in mountaineering, ran a shop in Qeshm, and was known by friends as kind, humanitarian, and animal-loving, especially cats. He was unmarried with a bright future ahead. Local witnesses say he was directly shot from behind on January 8th without being armed or posing any threat to anyone.
