description: 17-year-old shot in the leg during Shahinshahr protests on the night of 18 Dey. After being wounded, agents arrested him. Family searched for 20 days without finding him in police stations, hospitals, and forensic centers. According to an eyewitness, he was ultimately killed by a gunshot to the forehead. His body was identified at Shahinshahr forensic center after 20 days and buried in Chaghakhor county of Chaharmahal and Bakhtiari province.
