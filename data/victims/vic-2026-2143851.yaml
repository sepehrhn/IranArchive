description: Kurdish youth shot by government sniper with war bullet to the face during popular protests in Kernachi neighborhood of Kermanshah. The bullet entered through his face and exited through his throat. He was severely wounded and despite efforts by people at the scene to stop the bleeding and transfer him to hospital, doctors could not save his life due to the severity of his injuries. His body was returned to his family on 20 Dey 1404 and buried in Kermanshah cemetery. He had lost his father at age 6 and was working at a pharmaceutical distribution company, distributing medicine to surrounding villages.
