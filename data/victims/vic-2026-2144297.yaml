description: Shot directly by Islamic Republic agents on Andarzgoo Boulevard. One day earlier on January 8th, he had been hit by shotgun pellets but despite his injuries, he returned to the streets again in support of Prince Reza Pahlavi's call. Agents pursued him and after he fell, they fired three war bullets as finishing shots. His body was found after 22 days on January 31st in Kahrizak, Tehran and was buried secretly at night due to threats from Khamenei's forces. The suppressors also took 'bullet money' from his family. Two friends who were with him are still missing and there is a possibility they were also killed.
