description: 19-year-old physical education student shot and killed by Islamic Republic forces in Sayghalan Square in Rasht. He had joined street protests following a call by Crown Prince Reza Pahlavi. Shot from behind in the head area and died before being transported to medical center. His body was handed over to his family three days later, and his burial ceremony was held under security conditions at 10 PM. Family was asked to refrain from holding any public ceremonies or publicizing the incident.
