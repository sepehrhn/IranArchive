description: 20-year-old unmarried man from Isfahan, shot in the shoulder by a sniper positioned on the rooftop of a National Bank building at Abshar Square. Transferred to Sadoughi Hospital, affiliated with the Islamic Revolutionary Guard Corps (IRGC). During hospitalization, authorities denied his family visitation. One week later, relatives were instructed to report to Bagh-e Rezvan Cemetery, where they discovered that Pouria had been executed with a final gunshot to the chest, while his shoulder wound had been treated and bandaged.
