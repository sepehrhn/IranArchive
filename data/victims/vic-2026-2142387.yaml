description: Father of two children, retired worker from Hormozgan Steel Industries, originally from Khorramshahr and resident of Isfahan. Disappeared on the evening of January 8, 2026 during protests in Fooladshahr Isfahan. Family searched for him for a week with no official response. Body identified at morgue on January 14, 2026 with severe head trauma and swelling that made identification difficult. Severe injuries indicate extreme violence. Body was hastily buried the next morning by order of authorities with no funeral or mourning ceremonies allowed.
