description: Taxi driver and father of three children (ages 4, 11, and 15). Originally from Kangavar, lived in Vahidieh Shahriar for years. Was alone in Vahidieh area on Joughin Street when he was caught by Basij forces and plainclothes agents. First severely beaten with batons, then shot with pellet rounds to the chest and abdomen area, dying from the severity of his injuries. He was a relative of Erfan Khazaei, who was killed in the 1401 revolutionary uprising.
