description: Shot by government forces during popular protests in Eslamshahr with direct gunfire. Military bullet hit his leg area causing severe damage to artery, leading to severe bleeding and death. 23-year-old Gilak from Sarshakeh village in Lahijan, residing in Karaj. Recently engaged and about to start married life. After being wounded and suffering severe bleeding, he managed to reach in front of a house in the area and shortly after died due to severity of injuries. His body was handed over to family from Saeidiyeh hospital morgue and buried in his birthplace, Lahijan.
