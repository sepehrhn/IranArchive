description: Shot by government forces during protests. Government agents fired from the top of a bank building opposite the 'Chahar Baradaran' mosque on Motahari Street in Rasht. A bullet hit his leg, and he died at the hospital due to severe injuries and bleeding before receiving effective medical care. He was a Gilaki citizen of Rasht, 41 years old, father of a 16-year-old daughter, and worked as a worker in a supermarket. His family was pressured to sign documents and commitments to receive his body, and a public ceremony for him was prevented.
