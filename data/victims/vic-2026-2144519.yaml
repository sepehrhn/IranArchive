description: Shot in the forehead with a war bullet by Khamenei's agents while participating in protests supporting Reza Pahlavi's call. She was a 41-year-old citizen, mother of two children from Babol in Mazandaran. A Muslim and religious woman who went to the streets on Thursday evening after breaking her fast. After the killing, suppressors held her lifeless body hostage for several days under the pretext that 'she was a street leader of the protests'. Her uncle was also a martyr of the Iran-Iraq war.
