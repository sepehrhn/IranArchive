description: Shot in the head by security forces while bending down to pick up a stone on the main street of Kamalshahr. He was with a group of young people from the neighborhood when he became the target of direct gunfire and was hit in the head. His body was held at Behesht Sakineh cemetery for about a week, and its release was conditional on payment of money and transferring the burial location outside the family's main residence area. The family refused the request to transfer the body to another city, and after about eight days, the body was handed over with the condition of burial in a small cemetery around Karaj. Despite the proximity of Behesht Sakineh cemetery to the family's residence, they were not allowed to bury him there.
