description: "Follower of Yarsani faith, shot with pellet gun on January 8 during protests, returned to streets on January 9 and was wounded in the leg, then killed with a finishing shot by security forces. He had sent text messages to his wife and daughter during the protests that were not delivered due to phone network outages. In his message to his wife he wrote: 'If something happens to me, don't be afraid, stand like a lion.' In his final moments he wrote to his daughter: 'I love you very much.'"
