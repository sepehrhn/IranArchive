description: Shot with live ammunition by government forces during protests on his first night on the streets. Shot from very close range (less than 10 meters) with bullet entering his chest and side and exiting the other side. Body showed signs of severe beating before being killed with what was essentially an execution shot. Body was found buried under several other corpses in the fifteenth warehouse at Kahrizak morgue after family searched for hours. Related to Nika Shakarami, a victim of the 2022 protests.
