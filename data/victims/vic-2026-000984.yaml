description: |-
  PhD student in laboratory sciences. Shot by sniper from top of police station in Haft Tir area of Mashhad with war bullets. When someone went to help him after he was shot, the victim received two more shots from behind - one above the shoulder and one below the ribcage. Taken to Javad al-Aemeh Hospital but medical staff were told they were not allowed to treat him. Died from severe bleeding. Family had to pay one billion tomans to retrieve the body, otherwise his name would be recorded among Basij casualties. Buried on Saturday 20 Dey under security restrictions with very limited attendance.

  Shot by government officials near 7 Tir Square while moving away from the area. He was shot in the neck, shoulder blade, and arm.
