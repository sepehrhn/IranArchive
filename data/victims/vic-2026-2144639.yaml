description: 15-year-old football player shot during Iranian national revolution protests on Khaqani Street in Isfahan. Security forces first shot his legs with pellet gun while his father tried to protect him by throwing himself over his son's body. Officers then pushed the father aside and shot the teenager in the face with a shotgun, causing severe injuries that led to brain death. His body was returned to family four days later and buried in Najafabad, Isfahan next to his grandfather's grave. Funeral held under security pressure with only about 20 people allowed to attend.
