description: 55-year-old from Kelardasht who had gone to Rasht to visit his sister's house. During the Thursday night protests, he went to the streets and after being wounded, regime mercenaries shot him with a final bullet. His body was handed over to the family in exchange for receiving one billion tomans, but they were not even allowed to hold a funeral procession. He was buried at sunrise without acquaintances and family, under surveillance. He was married with two children and resided in Kelardasht.
