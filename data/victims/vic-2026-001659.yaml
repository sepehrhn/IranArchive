description: |-
  Shot in the head with a military bullet during street protests on 18 Dey 1404. He was a 40-year-old single man with a Master's degree in Public Administration, from a good financial background with successful business. He had participated in the 2022 Mahsa Amini protests, was arrested and had a legal case filed against him, but continued his activism. A patriotic young monarchist who came to the streets and was killed by regime thugs. His body was delivered to the family under severe pressure and after many days, with authorities even preventing publication of a simple mourning announcement.

  Persian Name: عارف براتی

  Shot and killed by direct fire from security forces of the terrorist Islamic Republic regime. The source mentions that over 200 people were killed in this town, but precise information is unavailable due to security pressures.
