description: Shot by security forces during protests in Tehranpars area of Tehran. According to witnesses, he was shot from above Rashid police station in Tehranpars while trying to help an injured person who had fallen to the ground as others were fleeing. He was hit by eight bullets in the shoulder, arm, chest and abdomen areas. His body was returned to family two days later from Kahrizak and buried in section 215, row 75 of Behesht Zahra cemetery. He was a bazaar merchant and father of a seven-year-old son. He had previously been detained for two months in 1401.
