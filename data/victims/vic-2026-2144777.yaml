description: Bakhtiari ethnicity, arrested in Kerman city and killed in custody. Body returned to family on 10 Bahman 1404 and buried in Fooladshahr, Isfahan where his family originally lived. Disappeared on 18 or 19 Dey month after not returning home, later confirmed arrested. Family received body after weeks of no information. Initial family examination showed no bullet wounds, cuts, or visible external injuries on the body, reducing likelihood of death from direct physical assault and increasing doubts about actual cause of death. Family believes he died during detention and suspects death may have resulted from forced injection or forced drug consumption.
