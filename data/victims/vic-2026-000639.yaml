description: |-
  Shot directly with a military bullet from behind by suppressive forces of the Islamic Republic regime on the evening of 18 Dey around 21:00 in front of Haft-Tir police station in Mashhad. The impact of the bullet was so severe that the entry point was destroyed about 7 centimeters. He was a resident of Seyyed Razi Street in Mashhad, worked in mobile phone sales and repairs, and had gotten engaged less than 6 months before his death. His body was buried on Friday morning in a desolate manner with only his sister present. He had been arrested during the 2022 national uprising and released on bail, and had been sentenced to 3 years and 1 month in prison about 3 months before his death.

  Killed on 18 Dey


  Killed on January 8, 2026.
