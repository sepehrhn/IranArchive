description: Kurdish young man from Divandarreh, resident of Tehran. Shot with live ammunition by Islamic Republic suppression forces during protests. Killed instantly. Body not returned to family and unclear if buried in Tehran. Family held limited mourning ceremony in Kani Sefid (Kani Charmu) village with only close relatives, public ceremony not permitted. Father Jalal Qahramani is a worker, family has lived in Tehran for over 30 years.
