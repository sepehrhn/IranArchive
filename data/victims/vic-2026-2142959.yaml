description: Teacher and environmental activist arrested at his personal residence on Tuesday 30 Dey by Islamic Republic security forces raid. Graduate of software engineering (bachelor's) and artificial intelligence (master's) from Isfahan University of Technology. Has been teaching computer science at high school level since 1396 in Alborz province and Karaj city. Threatened and summoned multiple times by security and intelligence forces since 1401 due to his positions during Woman Life Freedom movement. Suspended from teaching for about one year in fall 1401 by education department security under pressure from security institutions. Founded 'Siavash Unit' for preventing destruction, fires and restoration of Zagros forests. Was held in solitary confinement under lengthy interrogations from 30 Dey until 4 days ago, then transferred to Dehdasht prison.
