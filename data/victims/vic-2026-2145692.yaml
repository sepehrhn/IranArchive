description: Kurdish Yarsan citizen from Qasr-e Shirin who went missing on January 8, 2026 after participating in popular protests in Fardis, Karaj. Family was informed of his death on February 2, 2026 through government institutions. Killed in Fardis, Karaj and his body was transferred to Kahrizak. Family was under severe pressure from security forces and warned not to speak to media or inform anyone, or the body would not be returned. Death certificate listed cause of death as 'heart attack'. Body was returned to family on February 4, 2026 and buried under security control in a very short time in Behesht-e Sakineh cemetery in Shahriar.
