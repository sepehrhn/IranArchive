description: 18-year-old Kurdish youth from Kermanshah, originally from Amirabad village in Eslam-Abad Gharb (Shabad) in Kermanshah province, residing in Shahin Shahr, Isfahan. Shot directly with live ammunition by Islamic Republic suppression forces during popular protests on the evening of Friday 19 Dey 1404. Had 3 gold medals in bodybuilding and was preparing for competitions. Family was able to retrieve his body after several days and bury him in one of the cemeteries of Eslam-Abad Gharb, but were not allowed to view the body.
