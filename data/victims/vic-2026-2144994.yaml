description: Student at Shahrood University of Technology, known as 'Mahan Mardani', master's degree student in industrial management, fitness trainer with coaching certificate, and goalkeeper of university futsal team with runner-up achievements. Shot with direct fire near his home around 21:30. Hit by two bullets in femoral artery of his leg causing severe bleeding. Despite injuries, dragged himself to his house door but collapsed upon arrival. Witnesses described the bleeding as so severe 'it was as if they had poured red paint on the street pavement'. Died around 23:00 the same night due to severe injuries and blood loss. Body was buried on January 12, 2026 after family pressure and follow-up.
