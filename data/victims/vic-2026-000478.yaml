description: |-
  Basketball player and student at Sharif University of Technology, shot and killed by direct fire from Islamic Republic security forces while out on the street during nationwide uprising. He was a member of the Farzan Shemiran 3x3 basketball team which won the Tehran championship earlier that year, and was named Best Player of the Tehran Adult League in the same year.

  Shot and killed by direct fire from Islamic Republic security forces while on the street during nationwide uprising


  Shot during protests, described as one of Iran's top 5 basketball players. His father, a veteran of the Iran-Iraq war who suffered from chemical injuries, died after 27 years of illness. Ahmad grew up without his father's presence from age 9. He was described as athletic, active, responsible, and self-made. The Islamic Republic gifted him live ammunition instead of medals.
