description: 26-year-old Kurdish (Kurmanji) man living in Rasht who was severely wounded by direct shotgun pellets fired by Islamic Republic suppression forces during popular protests on January 9, 2026 (19 Dey 1404). After enduring his injuries for 25 days, he died at Poursina Hospital in Rasht. He had recently become a father and his child was only two months old. His body was buried under strict security measures at Bagh-e Rezvan cemetery in Rasht.
