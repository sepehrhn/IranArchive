description: |-
  18-year-old university student at Eqbal University of Mashhad. Shot by government forces during the Sun and Lion Revolution on January 9, 2026, in the Amir neighborhood at the intersection of Valiasr Street. Was shot from behind with a bullet to the pelvis area while with a friend. After falling and bleeding heavily, security forces moved him to a nearby alley where he was beaten and shot again. His friend was also arrested at the scene. Family searched for 12 days among hospitals, detention centers, and security institutions before receiving a call from Vakil-Abad prison in Mashhad to collect his body. Severe signs of beatings were observed on his head, face, and body. Body was buried on January 21, 2026, in section 67 of Behesht-e Reza cemetery in Mashhad under security restrictions.

  Persian Name: محمدصدرا زارعین

  Arrested on Friday, January 9, 2026 (19 Dey). His family was informed of his death the next day. His head, face, and body showed signs of severe beating. Buried on January 20, 2026 (1 Bahman), in Behesht Reza cemetery, Mashhad, in an area with a heavy presence of Basij and plainclothes agents.
