description: Shot from behind while helping an injured protester in Babol. She was from Gardanbari village in Mozirj section of Babol county. She was a veiled, dignified, patient woman who ran a small grocery store to support her family. She left behind two sons aged 23 and 9. Her family was considered a 'martyr family' as her uncle was killed in the Iran-Iraq war in 1984.
