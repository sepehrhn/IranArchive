description: Shot directly by Islamic Republic agents on Nirooye Daryayi Street (Resalat) in Tehran. After being hit by bullets, Al-Ghadir Hospital refused to admit her, but she died in her mother's arms at Shohada-ye Tajrish Hospital. Her body was delivered to the family on January 11, and she was buried in silence with ceremonies prohibited. She was her mother's only child, raised by her mother alone. While returning home from protests, she told her mother she was hungry and thirsty, and at that moment was shot from behind.
