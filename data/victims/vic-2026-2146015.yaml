disappearance_circumstances: Bahai citizen and tennis player, referee, coach arrested by plainclothes agents on January 20, 2026. Three unmarked civilian cars stopped in front of his father's house in Kerman around 3:30 PM. Agents had detailed knowledge of his daily routine and arrested him as he was leaving for tennis coaching class. During arrest, personal items including iPad and photo frames were confiscated from father's house, and mobile phone, laptop and personal items from his own home. Family has no information about his whereabouts despite multiple inquiries to prosecutor's office and other authorities who deny having him in custody. Unofficially told his case is with IRGC Intelligence but no formal charges announced. Only brief phone calls (less than one minute) allowed with family. Suffers from migraines and heart palpitations requiring medication, raising serious health concerns. No prior political activity or arrests. Part of systematic suppression of Bahai community in Iran who are denied basic citizenship rights.
