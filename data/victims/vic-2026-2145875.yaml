description: Shot by armed forces of the Islamic Republic during protests in Parand. The bullet hit his chest and killed him. He was from Tabriz and lived in Parand, owned a clothing manufacturing business. His body was among thousands wrapped in black bags at the Kahrizak Legal Medicine Center. His father received his body from Behesht Zahra cemetery in Tehran four days later and took it to Vadi Rahmat cemetery in Tabriz to bury him in his mother's grave who had died 30 years earlier.
