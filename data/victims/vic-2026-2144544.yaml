description: Newlywed who was killed only one week after her wedding by direct shooting from Khamenei's agents. Security forces delivered her body to the family 10 days after the killing, only after receiving money and a written commitment not to hold public funeral ceremonies. According to the burial permit issued by the Sari forensic medicine office, cause of death was 'rupture of abdominal organs and fracture of lumbar spine' due to 'impact of hard high-speed projectile', clearly referring to being shot with war bullets by government agents.
