description: |-
  Shot by the regime in the streets for protesting. Was an orphan with no family to receive her body after paying the $4,500 fine demanded by the IRGC for removing bullets from bodies of murdered protesters before burial. Buried in an unmarked mass grave. Her Telegram channel was called 'The Girl Who Was a Sun'.

  20-year-old orphan shot dead by suppression forces during nationwide protests. Ran a Telegram channel 'The Girl Who Was the Sun'.


  Orphaned daughter of Iran and killed on the path of the homeland. Setayesh has no one to seek justice for her. The author of the tweet states they have no sister but from today they do and will seek justice for her sister Setayesh.
