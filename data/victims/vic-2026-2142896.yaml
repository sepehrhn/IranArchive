description: From Marvdasht, lived in Isfahan, worked in car audio systems and owned a shop. Joined protests on January 9 and never returned home. Authorities contacted family on Tuesday to collect body, delayed delivery until Thursday. Family noted stitches on his head and a gunshot wound to his forehead. Was arrested and taken to hospital where he was killed.
