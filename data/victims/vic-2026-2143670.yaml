description: From Sahneh county in Kermanshah province. After finishing high school, came to Tehran to work - did various jobs including selling fruit juice, driving agency cars, construction work, while learning auto body repair and painting. Was a monarchist who supported His Imperial Majesty Crown Prince Reza Shah II. Killed during national uprising of Iranian people at a Friday rally in support of the Crown Prince in Tehran. Had orange hair, memorable laughter, was a skilled footballer whose dribbling moves are still remembered, and loved his dog.
