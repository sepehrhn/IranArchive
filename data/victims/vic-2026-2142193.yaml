description: One of two brothers killed during protests. Father of three young children, resident of Tehran. Shot directly by government forces during protests in Tehranpars area and fell into coma. While going to help his brother Hamid, was targeted with two bullets to the neck area. Died after 9 days on Friday 27 Dey. Security agencies demanded 1.5 billion tomans from family to return the body and forced them to sign a pledge declaring cause of death as 'brain stroke'. Also required family attendance at government rally in Revolution Square as condition for body return.
