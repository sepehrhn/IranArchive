disappearance_circumstances: 19-year-old computer science student sentenced to death by Branch 15 of Tehran Revolutionary Court under Judge Salvati. Arrested on January 8, 2026 in Damavand Street area of Tehran while returning from work at a men's barbershop where he worked to support his living and study expenses. He is an only child who had previously lost his mother. Denied access to chosen lawyer and effective defense. Currently held in Tehran's Greater Prison (Evin). State media broadcast edited forced confessions obtained under torture. Case transferred from Branch 3 to Branch 15 of Revolutionary Court, initial verdict sent to Supreme Court for review.
