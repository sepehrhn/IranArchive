description: Employee at Kowsar Clinic and former security guard at Valiasr Hospital. Shot during events at Shora Square after going to investigate reports of a fire at his former school. Struck by both pellet rounds and live ammunition in the abdomen, heart, and temple. Body released to family after 4 days. Family rejected authorities' offer to attribute the killing to protesters in exchange for monetary payment.
