description: |-
  37-year-old killed in Isfahan. He was arrested and authorities said he was alive and told family not to follow up. After a few days, Bagh-e Razvan (morgue) called saying there were several bodies to identify. When family went to identify, they found he had been shot in the stomach and died, meaning he was killed during detention.

  Persian Name: فرهاد فارسى

  37-year-old killed in Isfahan. He was arrested and his family was told he was alive and not to follow up. After a few days, they were called from Bagh-e Rezvan cemetery to identify several bodies. They found that he had been shot in the stomach and died, meaning he was killed while in detention.


  Arrested and killed during detention. His body was later identified with a gunshot wound to the abdomen. The authorities initially told his family he was alive and to not inquire further.
