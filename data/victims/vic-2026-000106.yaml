description: |-
  25-year-old Lor protester from Mamasani residing in Tehran. Injured by grenade shrapnel from Islamic Republic suppressors in Nazi-Abad neighborhood in south Tehran on evening of 18 Dey 1404, causing spinal cord injury to his neck area and leading to coma. Died on 24 Dey 1404. Body was buried on Friday 26 Dey in his birthplace Mamasani.

  Shot in the back of the neck with a war bullet by Khamenei's orcs on January 9, 2026, resulting in complete spinal cord injury. Died on January 24, 2026 due to worsening condition caused by the bullet.


  Shot in the back of the neck with live ammunition by 'Khamenei's orcs', resulting in complete spinal cord severance. Died on January 14, 2026, due to complications from the gunshot wound. Originally from Noorabad, Fars.
