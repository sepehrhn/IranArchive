description: Shot from behind with two bullets during protests on Friday January 9, 2026 in Sabashahr (suburb of Shahriar). One bullet hit above the heart and another hit his side. After being wounded, he was transported by pickup truck to three hospitals but none accepted him. Finally taken to a clinic where he died on January 14, 2026. Body was transferred to Kahrizak and burial ceremony held on January 15, 2026 in Sabashahr.
