description: |-
  Kurdish child from the village of Beryeh Sofla near Harsin, killed by direct fire from Iranian government forces in the Shahrak Moallem district of Kermanshah. Authorities attempted to pressure the family to claim he had been killed by protesters, but the family refused. His body was ultimately released to the family only after they paid 700 million tomans, and he was buried in his hometown on January 10, 2026.

  Murdered by Islamic regime's terrorists


  Kurdish child from Harsin, shot by military-security forces of the Islamic Republic during popular protests in Moalem neighborhood of Kermanshah. Funeral held on 20 Dey in Pariweh Sofla village.
