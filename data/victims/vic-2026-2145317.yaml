description: Shot and killed in Azimiyeh area of Karaj (Mandegar Tower). Was an only child. Blood stain remained at the location above Asbi Square, in front of Rosha pharmacy. Family was forced to pay money to receive his body. Security forces came and tore down mourning banners and decorations. Father paid additional money to be allowed to put up banners until the third day of mourning. When friends chanted slogans in front of his house, security forces came and opened fire, arresting several of his friends. He owned a Porsche and had good financial situation.
