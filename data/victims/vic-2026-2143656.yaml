description: Shot directly by suppressive forces of the Islamic Republic in Ahmadabad area. He was a merchant and bazaari from Mashhad who owned a men's clothing store. He was married and his wife was seven months pregnant at the time of his death. After his killing, his family kept his body at his father's house for a period to prevent it from being taken by security forces. His burial ceremony was eventually held in Behesht-e Reza cemetery in Mashhad, block 48, row 21.
