disappearance_circumstances: |-
  Charges: نامشخص

  بر اساس جستجوهای انجام‌شده در وب و پلتفرم X (توییتر سابق)، نگین خاکسار نوازنده و مدرس پیانو، فارغ‌التحصیل رشته نوازندگی از دانشگاه تهران، در روز یکشنبه ۲۲ دی‌ماه ۱۴۰۴ (۱۱ یا ۱۲ ژانویه ۲۰۲۶) توسط نیروهای امنیتی جمهوری اسلامی در تهران بازداشت شده است. این بازداشت بدون ارائه حکم قضایی و همراه با تفتیش منزل بوده و از آن زمان (بیش از دو هفته) خانواده‌اش هیچ اطلاعی از محل نگهداری، وضعیت جسمی، حقوقی یا اتهامات او ندارند. تنها یک تماس تلفنی کوتاه از زندان با مادرش داشته و این مورد به عنوان "ناپدیدسازی قهری" گزارش شده. نگرانی جدی از خطر اعدام یا آسیب به او وجود دارد، و این بازداشت بخشی از موج سرکوب معترضان و هنرمندان در اعتراضات سراسری ۱۴۰۴ است.
