description: Shot and killed during protests in Chamestan along with 24 others on night of 19 Dey. Personnel at Safari Elimarat tourism complex, migrated from Radkan (Chenaran County, Razavi Khorasan) to Chamestan for work. Shot from very close range with war bullets and buckshot, targeted from waist up. Buckshot completely damaged both lungs, both kidneys, spleen and liver, four fingers of right hand were severed. Father of two sons aged 18 and 8. Wife forced to sign document claiming he died in accident to receive body and threatened not to reveal truth about his death. Authorities wanted to present him as a trained leader who came to incite unrest in Chamestan due to being non-local.
