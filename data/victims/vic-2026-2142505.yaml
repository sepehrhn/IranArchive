description: Shot directly by government forces during popular protests while fleeing pursuit by a plainclothes government agent. He was a 23-year-old Lur citizen from Borujerd, a psychology student with two years left until graduation, and a gay man who had recently begun discussing his sexual identity with close friends. Government institutions had pressured his family to introduce him as a Basij member, which the family refused. His body was handed over conditionally on the family introducing him as a Basij member and burying him in another city, but after family opposition, he was buried at night without public notice.
