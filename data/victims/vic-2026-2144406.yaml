description: Shot in the legs with two military bullets while joining a gathering in front of his house in Isfahan. Was transferred to Kashani Hospital severely wounded. Government forces later attacked the hospital at midnight with the goal of eliminating the wounded, and deliberately shot finishing bullets into Hossein Rahimi and many other wounded patients. His body was transferred to Bagh-e Razvan cemetery in Isfahan and buried. His family was placed under severe security pressure and not allowed to hold any mourning ceremonies.
