description: |-
  Had just turned 18 in Azar month (November-December). Told his family that security forces were shooting at girls' feet with pellets and that he and others were going to stand in front of them to protect them. The day before, he excitedly told his sister he wanted to buy a motorcycle and was saving up money.

  Killed by the Islamic regime of Iran during the protests


  Killed in Salsabil, Tehran. The tweet mentions 'we witnessed your father's disintegration, Mani Baba. Your beautiful smile will remain in our hearts.' This suggests his father may also have been a victim or present during the incident, but only Mani is named as killed.
