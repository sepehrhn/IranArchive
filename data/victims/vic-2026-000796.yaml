description: |-
  17-year-old youth player for Saipa FC and member of Tehran's youth league, killed by direct fire from Islamic Republic forces during Iran's national uprising. Swimming champion and multi-sport athlete. Family learned of his death on Tuesday, January 13th after four days with no information. No official details released about exact time and place of death.

  Shot with war bullet by security forces during protests, shot from close range from behind according to his father


  17-year-old from Salas Babajani and player for Saipa youth football team, killed during popular protests in Tehran when hit by military bullet fired by Islamic Republic military-security forces. His father Adel Moradi stated that Ribin was shot from close range and from behind.
