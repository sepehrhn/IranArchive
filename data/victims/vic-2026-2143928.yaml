description: 29-year-old Kurdish man from Salmas, resident of Tehran, killed during popular protests on 18 Dey 1404 in Tehran. Shot with pellet bullets by Islamic Republic government suppression forces to the back of neck, liver and shin area. He was a shopkeeper, shot from behind at very close range in front of his shop door. Originally from Yengejeh village in Salmas county, had moved to Tehran for work. Body buried on 20 Dey 1404 in Salmas cemetery.
