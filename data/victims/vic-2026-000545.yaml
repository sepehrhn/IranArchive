description: |-
  Kurdish citizen and follower of Yarsan faith from Dalahu county. Father of three children from Darvit village in Dalahu, Kermanshah province. Suffered from heart disease and was killed by direct gunshot to the head by suppressive forces while going to a pharmacy in Saveh. Funeral held on January 15, 2026 in his birth village.

  Killed during protests in Saveh city, was a worker and follower of Yarsanism from Dalahu in Kermanshah province


  Shot directly from behind while on his way to the pharmacy. His body was buried 7 days later in his hometown. He was a worker and father of 3 children.
