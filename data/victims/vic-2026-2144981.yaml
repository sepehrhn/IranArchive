description: Shot with shotgun at close range to the chest area during nationwide protests in Sadeghiyeh area of Tehran. His body was found one day later on 19 Dey and finally delivered to family on 21 Dey after pressure and mediation. Forensic certificate states cause of death as shotgun pellet wounds, but family was forced to officially report cause of death as sharp object injury. Security forces banned any public ceremonies or mourning. Single, worked as repair technician and PDR worker, born in Ordibehesht 1381.
