description: 17-year-old child killed during protests after being shot by state forces. He was struck in the chest by pellet gun fire in the Towhid area. The child's body was not returned to his family. State authorities, without the family's consent, buried him in Section 56 of Behesht-e Masoumeh Cemetery in Qom—one of the most remote and marginalized sections of the cemetery. He was the son of a municipal worker in Qom and lived with his family in the Niroogah neighborhood, one of the city's most deprived areas.
