description: 30-year-old English and German language teacher who was directly shot by suppressive forces of the Islamic Republic during the national uprising in Tehranpars neighborhood. Despite his mother's warning not to go to the streets, he had left home. Government agents shot a bullet into his side at close range. After being hit, he managed to reach a nearby house but died from severe bleeding. The family was contacted through his phone and transported his body.
