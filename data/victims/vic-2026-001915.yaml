description: |-
  38-year-old teacher and father of three 3-year-old triplets named Alma, Pasha and Gersha. Shot directly in the side with a bullet in Isfahan. His body was kept for six days and then delivered to the family under pressure and threats, with demands that they declare the cause of death as 'being a Basiji' and 'killed by terrorists'.

  Persian Name: داوود سلطانی هلیسادی

  A 38-year-old teacher and father of three sets of triplets, he died in Isfahan from a direct gunshot wound to the side. His body was held for six days before being returned to his family under duress, with demands to report the cause of death as 'being a Basiji' and 'killed by terrorists'.
