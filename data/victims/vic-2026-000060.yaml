description: |-
  13-year-old Kurdish girl shot by Iranian government agents from approximately 5 meters distance while present in a park in Basij township, Keyhanshar boulevard, Kermanshah. She was a teenage champion in Wushu martial arts in Iran. Her mother had died three years earlier and she had no father, living with her aunt. Her body was buried on 21 Dey in Bagh Ferdows cemetery in Kermanshah.

  Shot directly by the Islamic Republic's repressive forces during popular protests in Kermanshah, possibly on January 8 or 9, 2026, inside a park.


  13-year-old Kurdish child shot by Islamic Republic military-security forces while present at Zeitoun Complex Park in Basij neighborhood during popular protests in Kermanshah. Her body was buried on 21 Dey in Bagh-e Ferdows Cemetery. She was an exemplary student and wushu athlete who had been living under her aunt's care for three years following her mother's death.
