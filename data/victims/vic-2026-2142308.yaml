description: Shot directly in the face with a war bullet in front of his father's eyes. His father carried his half-alive body into a house to save him, but regime mercenaries broke the windows and stormed the house to take the wounded protester. The father was forced to take his son to the hospital, but Amirhossein died. After this crime, the government pressured the grieving family to falsely introduce him as a Basiji member in an attempt to distort the truth.
