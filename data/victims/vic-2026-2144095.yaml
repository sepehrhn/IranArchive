description: Facilities engineer, professional bodybuilder and kung fu athlete. Shot with war bullets by government forces in Zarinshahr in front of his family's eyes while trying to help someone who called for assistance. He was crossing the street with his mother, sister, wife and aunt when they heard a cry for help. He stopped the car and got out to help. Moments later shooting began. Family only screamed 'Don't shoot'. He was hit by bullets and died at 23:45 at Shohada-ye Lenjan Hospital. Family was not allowed to say goodbye. Body was transferred in a black bag and two days of uncertainty and searching continued until identification at Bagh-e Rezvan cemetery in Isfahan. Burial was conducted under security conditions and time restrictions. After burial, family was asked to declare him a 'martyr' which they refused.
