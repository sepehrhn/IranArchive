description: Shot from behind with a war bullet in the lumbar area while in Andisheh Township, Tehran. He was a 30-year-old single CNC machine operator. After being shot, he was transferred to hospital but his body was then moved to Kahrizak. His family had to search extensively and endure pressure and follow-ups for about a week before they were able to retrieve his body. He was born on 29 Dey and was only a few days away from his 30th birthday.
