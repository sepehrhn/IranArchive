description: Skating champion of Isfahan, shot in the chest on Jaber Ansari Street. He closed his mechanic shop on the 19th and went home to change clothes. Despite his wife's attempts to stop him, he said 'My brothers and sisters are alone, I must go help them' and went to join the crowd in chanting slogans. He was killed by a war bullet to his chest. Family has been pressured by IRGC intelligence not to speak about it anywhere. He had two children, a daughter and a son.
