description: 21-year-old veterinary student at Chamran University of Ahvaz who died suspiciously just days after being released from detention. He was arrested on 2026-01-08 during protests and released on 2026-02-03 after more than a month in prison. Sources close to him reported he was not in good mental and physical condition after release, and friends said he was tortured during detention. He suffered a heart attack in his sleep and died. There have been multiple reports of torture and injection of suspicious drugs to detainees of the Lion and Sun Revolution of Iran, with an increasing number of people dying shortly after release.
