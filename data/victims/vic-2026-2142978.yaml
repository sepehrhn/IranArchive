description: 17-year-old from Fardis, Karaj who was injured during suppression of popular protests, transferred by government forces to Kachouei prison where he died overnight. Body was held at Kahrizak for five days before being released to family. Family was charged 700 million tomans as 'bullet costs' and forced to give heavy commitments under security pressure. Burial was restricted to a village around Hashtgerd.
