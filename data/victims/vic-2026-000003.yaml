description: |-
  MBA degree holder killed during popular protests in Bushehr when targeted by government forces shooting. Severely injured by two war bullets to her side, died after being transferred to hospital. Her body was handed over to family after four days of follow-up and repeated visits to various medical and administrative centers, buried on 24 Dey.

  During protests on Friday, 9 Jan 2026, in Bushehr, southern Iran, armed motorbike units of IR suppressive forces shot Zahra Fazeli in the chest. She was 38 years old.

  Her family released Zahra's body by paying a $4,500 “bullet fee.” Zahra was laid to rest on Friday, 16 Jan 2026.


  Shot in the chest by armed motorbike units of IR suppressive forces. Her family paid a $4,500 “bullet fee” to retrieve her body. Laid to rest on January 16, 2026.
