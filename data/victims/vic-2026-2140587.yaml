description: Had a bachelor's degree in graphics and worked as a freelancer. She was described as kind, calm and beloved among friends. She participated in most protest gatherings in Isfahan from early Dey month. Last seen participating in a demonstration on 18 Dey 1404, went missing from 19 Dey 1404. Her body was buried at 6 AM in Bagh-e Rezvan cemetery in Isfahan without public announcement and under strict security measures with presence of Islamic Republic security agents. Her mother was reportedly threatened by security forces and prevented from making this matter public.
