description: Shot directly in the head by security forces during protests in Yazdanshahr on Motahari Boulevard. Was transferred to Fateme Zahra Hospital in Yazdanshahr the same night and died there. Security forces only returned his bloodied clothes to his family and told them to go to Bagh Rezvan cemetery in Isfahan to collect his body. Family had to wait 5 days before the body was returned to them. He was described as an extremely kind and lovable young man who had returned from military service less than a year ago. He worked as an apprentice in car color identification, working from 5 AM to 5 PM. He was raised by his mother along with his two sisters under difficult circumstances.
