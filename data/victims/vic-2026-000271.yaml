description: |-
  Shot directly by Islamic Republic armed forces to his eye and head from a distance of several meters. He was the owner and driver of a famous white Peykan car that transported wounded protesters to safe places, but the suppressive forces identified his vehicle and shot him with bullets. On the evening of 18 Dey, a bullet shot to his head and eye took his life. Behnam was a farmer and shopkeeper from Memasani. He was buried in the same Memasani.

  Killed by Anoushirvan Safaei, shot by live ammunition


  Son of Solat, killed by Anoushirvan Safaei with live ammunition.
