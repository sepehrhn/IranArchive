description: Shot directly at around 8:30 PM in the fifth circle of Fardis, Karaj. A war bullet hit him from behind; the bullet entered through his lower back and exited through his abdomen. He died in his wife's arms. Family kept his body in the car until morning to prevent authorities from taking it. Family was told he could not be buried in Behesht Zahra or Behesht Sakineh and must be buried in Behesht Ali cemetery in Eshtehard, where other victims from Karaj and Fardis are reportedly buried. Family faced restrictions even in choosing words for the tombstone - they were not allowed to use 'martyr of the homeland' and had to engrave a bird over the word 'homeland'.
