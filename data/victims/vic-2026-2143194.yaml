description: Shot by Basij forces while passing by a Basij base with her sister on Dolat Street. They were going to a pharmacy when a gunman from the base suddenly aimed through the car window and shot her. Glass shattered on her sister's head and eyes. Her sister screamed 'Narges, go!' before sudden silence filled the street with the smell of gunpowder and narcissus flowers. She was described as stubborn and kind, studying to become a doctor, and always helped a little flower-selling girl at intersections.
