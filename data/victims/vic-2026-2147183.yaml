disappearance_circumstances: 18-year-old Gilaki citizen from Chaboksar, arrested during nationwide protests in Dey month 1404 in this city. According to informed sources, he was arrested after 20 Dey month while he was present beside the street by security forces of the Islamic Republic of Iran and has been in detention since then. According to these reports, Javad Ebrahimi has been subjected to severe pressure and torture and forced to make forced confessions about accusations that his family and those around him deny. Concerns about his physical and legal condition are serious. At the time of preparing this news, clear information about official charges, place of detention and his access to a lawyer has not been published.
