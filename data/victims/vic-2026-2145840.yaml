description: Father of a young daughter, originally from Shahsavar and residing in Tehran. Disappeared in Tehran on Dey 18 (January 8). Family thought he might have been arrested. After 50 days, family was contacted to collect his body from Kahrizak. Body showed he had been shot in the shoulder and all organs had been removed. His father had passed away the previous year and his mother was not allowed to attend his burial ceremony.
