description: Shot from behind with a war bullet while standing at the end of her street in Taq-e Bostan Boulevard neighborhood. Suffered severe tearing of abdomen, intestine, uterus, and bladder. Kermanshah emergency services refused to send an ambulance to transfer her to hospital. She was a 42-year-old supervisor at Imam Ali Hospital in Kermanshah, a diabetic mother with poor eyesight, and had a sister with kidney problems. Her father had died years earlier and she was the breadwinner and 'pillar of the house' for her family.
