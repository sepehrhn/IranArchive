description: Shot directly in the heart with a bullet in Fooladshahr, Isfahan province around 6 PM. After being shot, friends transported his body to his residence where his mother alone carried the corpse up three floors. The body was later transferred to hospital but it was announced he had died at the moment of shooting. Family searched for his body for several days at various centers until it was found that his body, like many other protest victims, had been transferred to Bagh-e Rezvan cemetery in Isfahan. Body was returned to family on Monday and buried the same day under security pressure with recommendations for 'no crowds and refraining from any speech'. He was a baker who lost his father at age 2 and started working from a young age. He was described as a quiet, hardworking person who stayed away from trouble and was a serious fan of Esteghlal football team.
