description: Shot in the leg by security forces during protests on Harr Boulevard in Shahid Rajaei neighborhood on January 9, 2026, then arrested. Family was kept in uncertainty for weeks, told he was alive and offered his release for payment of gold coins. Body was returned on February 1, 2026, showing severe signs of torture, burns from iron, beatings, and a final bullet to the head. Body was so damaged it was barely recognizable, mother could only identify him by an old childhood mark. From Qazeqan village, a suburb on the Miami-Mashhad road.
