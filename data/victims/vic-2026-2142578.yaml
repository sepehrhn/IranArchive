description: Single 26-year-old born in Mashhad, killed by government agents in Meraj Square from inside a security building with three war bullets - one to the heart, one to the side, and one to the shoulder. Family was not allowed to hold ceremonies or even bury him in Mashhad. Family was forced to pay 500 million tomans to retrieve his body. He was buried in Shir Hesar village next to his mother's grave.
