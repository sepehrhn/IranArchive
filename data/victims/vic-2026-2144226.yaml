description: PhD student and mathematics elite who was shot by Islamic Republic forces on the night of January 8, 2026 during suppression of popular protests. He was severely wounded and hospitalized for several days before dying from his injuries. Previously beaten severely during Green Movement protests in Shiraz to the point of near death. Had been under security pressure for years including detention, expulsion from university, and systematic educational and professional restrictions. According to his cousin, he was killed with a shot to the heart while in Islamic Republic custody.
