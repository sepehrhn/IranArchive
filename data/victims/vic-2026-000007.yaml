description: |-
  Shot in the heart with live ammunition by a government sniper positioned on top of the Goldis building during protests in the Sadeghiyeh neighborhood of Tehran near the Goldis complex and close to the Shahr-e Ziba and Dehkadeh taxi stations. Taken to Ibn Sina Hospital by a friend. Family searched for him throughout the night and learned of his death after seeing images from the morgue. Family spent hours searching among more than 1,500 body covers at Kahrizak before identifying him. Buried on January 10 in Section 329 of the cemetery.

  Shot by security forces in Sadeghiye, Tehran on January 9, 2026. He has been buried in plot 329.


