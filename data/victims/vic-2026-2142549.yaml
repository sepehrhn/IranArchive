description: Shot by Islamic Republic of Iran government forces during protests near Rasht municipality. First hit by shotgun pellets in her leg, then after being moved to a nearby alley for potential medical transport, security forces arrived, beat her, and shot her in the genital area. She was hospitalized in critical condition and unconscious for two days before dying from the severity of her injuries. She was a Gilaki citizen from Sangar.
