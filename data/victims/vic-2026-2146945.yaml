disappearance_circumstances: "Arrested: ۱۸ دی ۱۴۰۴\nPrison: زندان زنان دولت آباد\nCharges: نامشخص\n\nمتاسفانه خانواده این خانم از ترس زیاد ایشون رو رسانه ای نکردند و اسمشون در هیچ خبر و رسانه ای نیستمن یک نفر از دوستانم که نخاستن\_اسمشون برده بشه گفتن که ایشون از افراد فامیل نزدیک شون هستند که در روز ۱۸ دیماه داشتن با بچه شون از دکتر برمیگشتند‌( یعنی ایشون اصلا حتی تضاهرات هم نمیکرده)  بهشون  توی خیابون تیر زده میشه. بعد از اینکه میبرنش بیمارستان بعد از اونجا میان و مامور ها میبرنش.از اون روز خبری ازش نیست. دوستم گفتند که مثل اینکه یه بار زنگ زده و نمیدونسته کجاست گریه کنان میگفته فقط من رو از اینجا نجات بدید ولی در کل دوستم میگه خانوادش خیلی میترسن واصلا حرف نمیزنند از اون روز وقتی ازشون میپرسی میگن خوبه و دیدیمش و توی زندان زنان دولت آباد هست ولی مطمینا\_از ترسشون هست. دوستم میگن واقعا نمیدونند که وضعیت ایشون به چه شکل هست و نگران هستند. خانواده ش تلفنی هم چون میترسن اصلا صحبت نمیکنند. لطفا اسم ایشون رو هم در لیست بازداشتی ها قرار بدین و با هرجای دیگه همکاری میکنید اسم ایشون رو هم قرار بدین اسم شناسنامه ای ایشون بتول هست و اسمی که صداش میزنن هاجر هست."
