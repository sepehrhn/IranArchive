description: Baluch student shot and killed by suppressive forces during protests in Mashhad. Son of Mohammad Karim, from the Rigi tribe, originally from Zahedan but residing in Mashhad. Economics student at Azad University of Mashhad. Shot in the head with a war bullet in the Haft-e Tir area of Mashhad while going to join protest gatherings with a close friend. Died on the spot. Family was under severe security pressure and forced into silence. Body was buried in silence without the presence of relatives after being handed over from Behesht-e Razvan morgue.
