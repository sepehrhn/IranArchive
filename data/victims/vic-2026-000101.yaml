description: |-
  Kurdish father of one, originally from Mehran in Ilam Province, killed during protests in Abadan, Khuzestan Province, after being shot directly by Iranian government forces. He was employed as a contractor with the Abadan Oil Company. Authorities withheld his body for five days and compelled his family to sign written pledges not to speak to the media before releasing it. He was laid to rest on January 13, 2026, in his hometown.

  Shot with war bullet, oil company contractor, married with young child, body delivered after 5 days of threats and written commitment


  Targeted by state security forces with direct fire from a pellet gun at close range on Amiri Street. His body was released after five days of security pressure.
