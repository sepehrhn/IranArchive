description: Engineer at oil company working in Assaluyeh, originally from Radkan city in Chenaran county, Khorasan. Arrived in Mashhad on Thursday morning, left home at night and his lifeless body was found in Behesht-e Reza morgue after one week. He was an inventor with patent registration for high-pressure pumps for oil wells and owned a company based in the New Technologies Park. Father of a 7-year-old daughter. Shot with one war bullet to the head and shotgun pellets (at least 40 pellets) fired at close range to his stomach on Tabarsi Boulevard in Mashhad. Rope marks were clearly visible and bruised on the skin of his hands and neck.
