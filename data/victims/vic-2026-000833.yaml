description: |-
  Kurdish Yarsan young man and taekwondo champion killed by war bullets fired by Islamic Republic suppression forces during protests. Son of Ali, follower of Yarsan faith, national team member and medal winner in taekwondo. Buried at Raqeh Sarab Tiran cemetery in Kuzran on January 11, 2026. Family may have been forced to pay between 700 million to 1 billion tomans to receive his body according to sources.

  Taekwondo athlete. Shot in the head with live ammunition by suppressive forces in Sabouni neighborhood during the Iranian national revolution. Follower of the Yarsan religion.


  Shot directly in the head with live ammunition by security forces in the Sabouni neighborhood of Kermanshah. He was a follower of the Yaresan faith. His body was returned to his family after they paid 700 million tomans to security agencies, and he was buried on January 11, 2026, in the 'Raghsar Sarab-e Tiran' cemetery in Kozaran.
