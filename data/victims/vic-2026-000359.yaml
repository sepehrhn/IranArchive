description: |-
  Shot from behind, appearing to suffer spinal cord injury and unable to walk. Companions hid him under a car for an hour to prevent security forces from delivering a fatal shot. He remained silent under the car to avoid detection by security forces. Could not endure and died in the car an hour later when friends came to take him to the hospital.

  Died in a car while friends attempted to protect him from further shooting. He died one hour after being placed under the car.


  Shot in the upper body from behind around 10 PM near Dr. Hesabi Street, Isfahan. Died from blood loss before reaching the hospital. His body was returned to his family four days later and buried in Bagh-e Rezvan, Isfahan.
