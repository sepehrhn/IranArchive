disappearance_circumstances: 35-year-old Kurdish citizen from Javanrud, Kermanshah, resident of Ramsar. Owns a mobile phone shop in Aramesh Passage in Ramsar where he was arrested. Arrested twice during protests - first on Wednesday 24 Dey (2026-01-14) by IRGC Intelligence and released after one day, then arrested again the next day and transferred to IRGC detention center in Sari. Charged with 'moharebeh' (enmity against God) for alleged connections with Israel and America. Family informed orally by IRGC Sari that he has been sentenced to death and execution will be carried out in Tehran. Likely transferred to security detention centers in Tehran. Denied access to lawyer and other basic prisoner rights.
