description: |-
  Iranian-Swedish dual citizen, shot with two bullets to the stomach and side by Islamic Republic agents on January 8, 2026 in Tehran and died from his injuries. Security forces informed his family on January 9 that he had died. Family found his body in Kahrizak in late January; according to relatives, his face was in such condition that he could only be identified by a tattoo on his hand.

  Shot on the street and taken to hospital. Disappeared after being admitted. His body was found in Kahrizak 12 days later (January 20), severely swollen and unrecognizable, identified only by a tattoo.


  Dual Iranian-Swedish citizen. Shot on the street, taken to hospital, disappeared, and body found 12 days later in Kahrizak. Identified by a tattoo. The date of death is calculated as 12 days after he was shot and admitted to hospital, which is not explicitly dated but implied to be shortly after the start of the protests.
