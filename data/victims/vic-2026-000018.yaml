description: |-
  Young artist and hairstylist who worked in music production and accessory sales at AS Man boutique. Gunned down by bullets of Islamic Republic forces in his own city. Remembered as joyful, nature-loving, energetic, and fiercely loyal companion. Grave photo inscription reads 'Soldier of the Path of Light'.

  Mehran Salimi was killed by a gunshot in Hashtgerd on February 7, 2026. 
  By the time he was brought to the hospital, he had already passed away. 
  His family managed to take his body out of the hospital at night, but security agents seized it from them while they were en route.


  Gunned down by Islamic Republic's forces. Described as a vibrant young artist and talented hairstylist, thriving in music production and accessory sales. Friends remembered him as joyful, nature-loving, energetic, and a fiercely loyal companion. Photo on grave reads: Soldier of the Path of Light.
