disappearance_circumstances: 26-year-old protester from Tehran, born in Mehr 1378, arrested on January 8, 2026 (18 Dey 1404) on Namjou Street by security forces. Sentenced to death on charges of moharebeh (enmity against God) by Revolutionary Court headed by Abolghasem Salwati. Was trapped inside a Basij base on Namjou Street when an unknown person set fire to a motorcycle at the entrance, blocking the exit, then set the base on fire. After firefighters extinguished the flames, security agents arrested Ali Fahim and other protesters who were inside the base, accusing them of arson. Family had no news of him for 10 days until forced confessions were broadcast on state TV. Deprived of access to lawyer both during preliminary investigations and trial. Court proceedings were very brief without opportunity for effective defense.
