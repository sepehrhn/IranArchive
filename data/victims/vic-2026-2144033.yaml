description: Shot by Islamic Republic suppression agents around 8 PM on January 9, 2026, at the second roundabout in Fardis, Karaj. He was hit by a bullet from behind, in the back of his head. The bullet exited through his temple. People at the scene dragged his blood-soaked body into a parking lot. He was a father of two children and a 30-year-old businessman on Malard Road. He was supportive of working and street children and orphans, had a big heart and helped anyone in need within his means. He cared for elderly men and women and orphaned or poorly cared for children.
