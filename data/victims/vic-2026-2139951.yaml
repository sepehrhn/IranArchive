description: |-
  Army commando from Khorramabad who went to protest in civilian clothes with his commander. Both were shot with jungle bullets and killed. Family was contacted 48 hours later. Father is retired army personnel. When father arrived at Kerman morgue, he saw about 12 young men and women left in corner to die. Father protested they were still alive and should be helped, but was told to either shut up and take his son's body or leave. Father believes if they had reached Milad in time, he would have survived and that he died suffering. Father was pressured to say his son died defending the government.

  Shot and killed in Kerman. According to his comrades who were present at the scene, four bullets hit his body from the direction of the Qasem Soleimani statue. Originally from Khorramabad. His funeral was held in a security-controlled environment on January 12, 2026.
