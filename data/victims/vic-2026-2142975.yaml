description: Shot by IRGC sniper while standing in the street with her mother and friends in front of their house alley at around 10:30 PM. First hit by pellet bullets, then by live ammunition. A sniper's bullet struck her beneath her left breast with such force that a piece of flesh was torn from her back. She was a kind, compassionate girl who was deeply saddened by the killing of other young people and would cry for her 'sisters and brothers'. She had a Telegram channel where she shared personal writings.
