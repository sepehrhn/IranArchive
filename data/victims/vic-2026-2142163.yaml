description: Killed alongside his friend Behrooz Bigdeli. They were killed while embracing each other. Was a fan of Seyyed Mehdi Mousavi and called himself 'Sad Dracula'. Family was told at the clinic to take the bodies quietly without noise or they wouldn't be allowed to retrieve them. Family had to get a pickup truck, were given a blanket to wrap the body, took him to his mother, then delivered to morgue at night. The next day the morgue initially refused to release the body and caused much trouble before the family could retrieve it for burial in Darche, Isfahan.
