description: Arrested on January 8, 2026 in Seyedi area of Mashhad. Body found after about two weeks of no contact on January 22, 2026 in Behesht Reza cemetery in Mashhad. Body showed extensive signs of torture and he was killed by a fatal bullet to the head. He was from Golbu village in Neyshabur county and worked as a bus mechanic. His family was pressured after this incident and forced to declare on government television that he was a Basiji member, statements that according to family relatives were made under duress.
