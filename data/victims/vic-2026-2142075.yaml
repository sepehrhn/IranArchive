disappearance_circumstances: Artist, musician and former political prisoner (from 2022 and anniversary of Kianoosh Sanjari) who was violently arrested at midnight on 8 Bahman by 10 armed plainclothes agents at his personal residence. He was severely beaten and abducted. All his electronic devices including mobile phone, laptop and hard drive were confiscated by the agents. Only received one brief phone call on 11 Bahman confirming he was alive. No reliable information available about charges, detaining authority or place of detention after 25 days.
