description: 19-year-old from Malek Shahr who participated in protests on 18-19 Dey month. After participating in protests, he received threatening calls from security agencies. On 28 Dey month, while working as a Snapp driver, he was kidnapped by unknown individuals in Shahin Shahr area. Local sources say he died after being injected with a toxic substance following his abduction. His body was found hours later on the side of a street in Shahin Shahr. His family has been threatened by security forces to remain silent about his death.
