description: Kurdish Yarsan citizen shot with a war bullet from behind by Islamic Republic military-security forces during popular protests in Elahiye neighborhood of Kermanshah. Security forces did not allow his body to be buried in Kermanshah city, and the family was forced to bury him in their family village, 'Saraylan Toh Khaki'. The burial ceremony was held on 21 Dey despite the security atmosphere, with participants chanting anti-government slogans.
