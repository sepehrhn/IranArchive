description: |-
  22-year-old Gilaki citizen from Chanask village, Abik county, Qazvin province, mathematics student at Qazvin International University. Shot directly with war bullets by Islamic Republic of Iran forces in Zibashahr area of Qazvin. She was an outstanding and Olympiad student at the university and served as secretary of the mathematics scientific association. After her killing, Imam Khomeini University of Qazvin tried to attribute this murder to opponents of the Islamic Republic of Iran and put her name in the list of 'security martyrs'. Students later shared messages from her personal channel showing her freedom-seeking views, but government institutions pressured the university and students to delete these messages and limit access to her personal channel. Her body was buried in her birthplace, Chanask village.

  She was a 22-year-old woman and a mathematics-and-applications student at Imam Khomeini International University of Qazvin. 
  Friends and peers describe her as a high-achieving student—an Olympiad participant—and a committed member of the academic community 
  who served as secretary of the department’s mathematics association. 
  According to reports, she was killed on the night of 9 January in Qazvin 
  by security forces of the Islamic Republic during the wider crackdown on protesters. 
  Sources also state that authorities attempted to frame her death as the result of “terrorist attacks” and put her family under pressure. 
  In contrast, people close to her—and content attributed to her personal Telegram channel—describe her as a freedom-seeking young woman 
  with pro-monarchy leanings who went into the streets on days of protest calls, seeking the overthrow of the Islamic Republic.
