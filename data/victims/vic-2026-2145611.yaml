description: Shot by Khamenei's criminal forces in the evening in Ardabil. She was an employee of the Social Security Organization in Ardabil, originally from Arak, former operating room technician at Gardoo Hospital in Arak, sports first-aid instructor and mountaineer. After days of withholding the body, it was finally transferred to Arak and buried in Arak Cemetery, section 39, first section of Behesht 2, following pressure from the Social Security Organization's security department. Her family and husband were severely threatened and pressured into silence regarding the regime's false narratives.
