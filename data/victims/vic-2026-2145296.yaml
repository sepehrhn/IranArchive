description: Kurdish man from village of Sartang in Eyvan-e Gharb, Ilam Province. Killed under torture following arrest by Iranian intelligence agents in Bandar Abbas on February 6, 2026. After several days in custody at a detention facility, he was killed under severe torture. Authorities claimed he 'committed suicide.' Had previously been a member of Komala Party of Kurdistan for two years in Kurdistan Region of Iraq, left the party prior to 'Women, Life, Freedom' movement and returned to Iran. Became active during the movement and was previously arrested and interrogated. Was employed as a laborer at Shahid Rajaee Port. Family was threatened against speaking publicly about the killing.
