disappearance_circumstances: Political activist arrested by security forces in Likak city of Kohgiluyeh and Boyer-Ahmad province after about a month of pursuit and chase. After two days of detention in Likak, he was transferred to Dehdash prison. He had been previously arrested in 1388, 1398, 1401, and 1404 for political activities. He is also known as a lawyer who played a role in pursuing trade demands of drilling industry workers, in a legal campaign to secure rights and benefits for over 30,000 personnel of the National Drilling Company.
