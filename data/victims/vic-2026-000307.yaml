description: |-
  Architecture student at Islamic Azad University of Najafabad and firefighter. Shot and killed by agents of the Islamic Republic regime at Market Square intersection during Iran's Lion and Sun Revolution. Struck by two live bullets to the chest. Son of Ebrahim Radi, a veteran of the Iran-Iraq War. Also worked as a trained diver.

  Mentioned in a tweet with the hashtags IranMassacre and R2PforIran, suggesting he was killed in the protests.


  Mentioned in the context of the IranMassacre, with a wilting rose emoji.
