description: 21-year-old single man from Bumehen who left home on the evening of 18 Dey 1404 and never returned. His family had no information about his fate for a week. His brother searched daily at police stations, hospitals, prisons, and forensic medicine centers. After visiting the Kahrizak forensic medicine center three times and searching among thousands of bodies, Mohammad's body was finally identified there after one week. His father had died years earlier when Mohammad was only four years old.
