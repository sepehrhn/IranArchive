description: 16-year-old who was participating in protests with friends in Seyedi neighborhood of Mashhad. He was separated from his friends and went into an alley where he was first wounded by pellet shots, then killed with a finishing shot by terrorist forces of Basij and IRGC. His body was taken home by his father the same night from the hospital and kept in the courtyard until morning, then buried outside the city away from suppressive forces by his parents.
