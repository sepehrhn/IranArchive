description: 25-year-old master's student in psychology, resident of Malekshahr Isfahan. Shot directly with war bullets during the Sun and Lion Revolution on 19 Dey 1404. The bullet hit directly to her abdomen and chest area. Known by friends as 'Fereshte' (Angel) and remembered as a girl with noble human morals. Her body was delivered to family after about 10 days with security threats and delays, and no public ceremony was allowed. She was buried under security pressure.
