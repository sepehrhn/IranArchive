description: |-
  Shot and killed during protests at 9:55 PM on January 8th. According to his mother's account, they went out together at 8 PM when the whole street was crowded. At 9:50 PM he had moved about 100 meters away from his mother when security forces started shooting. He was killed at 9:55 PM in front of his mother's eyes. He hadn't even eaten dinner, saying they would return home to eat.

  Shot with direct bullet to the heart in front of Golshahr Hospital in Karaj. Son of Rezgar Abbaspour from Ilam, living in Karaj. Father described as one of the most honorable people who spent his life helping patients in the most remote villages of Ilam. The young man died in his father's arms in the street.
