description: 41-year-old Bakhtiari resident of Yazdanshahr. Shot with two military bullets to the stomach and pelvis on January 9, 2026 (19 Dey). Was hospitalized in ICU for two days and underwent two emergency surgeries, but surgeons could not control the bleeding due to multiple injuries. Died on January 11, 2026 (21 Dey). After death, his body was transferred by intelligence forces to an unknown location and later found at Bagh-e Rezvan cemetery in Isfahan. Family was forced to sign a commitment that they had no right to hold a public funeral procession, only close relatives could attend, and burial had to be early morning in silence. Buried on January 16, 2026 (26 Dey) in a brief and lonely ceremony in his hometown Yazdanshahr. Due to prohibition from using mosque and Husseiniya, farewell ceremony was held at home. Had English language degree, served as officer in Isfahan Air Force from about age 20-30 but bought his way out. After leaving military at age 30, worked as taxi driver, later entered stone business extracting from quarries and converting to facade stones.
