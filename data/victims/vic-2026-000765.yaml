description: |-
  Shot by bullet during protests on 18 Dey in Eslamabad-e Gharb. Had recently completed military service and was working as a laborer. Aspired to be a photographer and had ordered a camera with money earned from his labor work to help support his family. The camera was delivered to his mother two days after his death. Had a diploma in electrical engineering. Body was buried at Imamzadeh Hassan in Eslamabad-e Gharb.

  Shot by suppressive forces during protests


  Killed during protests. Identity confirmed by Hengaw.
