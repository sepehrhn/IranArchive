description: Shot in the abdomen during protest on Shariati Street in Najafabad, Isfahan. She left home to protest and never returned. During the protest, people were surprised by tear gas, and the path behind was blocked with pellet guns and tear gas, forcing the crowd to move forward. They hadn't even reached near the police station and were standing at a distance. Street lights were off and it was dark. Suddenly, without any warning or warning shots, they shot at people. She was wounded by a bullet to the abdomen and died about an hour later.
