description: Shot by security forces' pellets in Qeytarieh, Tehran. Was taken to Qeytarieh Clinic alive and receiving treatment when security agents abducted her. Her body was later found at the forensic medicine office with a fatal gunshot wound to the chest. Born in Bojnord, was a monarchist supporter who fought for years for Iran's freedom and the return of Crown Prince Reza Pahlavi.
