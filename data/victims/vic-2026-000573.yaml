description: |-
  Shot in Haft Hoz area. Bullet entered his left side and exited from the right, destroying his internal organs. He died on the spot from direct gunshot. His body was left in a garden where his friends found him and brought him home. Family tried everything - applied pressure to wound, gave artificial respiration, performed heart massage - but he had died from internal bleeding. He was wearing a shirt that read 'A soldier for life'

  Killed by Islamic Republic regime during protests


  Shot in the left side with a direct bullet that exited his right side, destroying all internal organs, and died instantly. His body was left in a garden and found by his friends who brought it home. His family attempted to stop the bleeding and provide resuscitation, including cardiac massage, but he died from internal bleeding. The text on his shirt read 'Service for Life'.
