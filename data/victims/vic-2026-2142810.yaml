description: Shot with four bullets to the leg and abdomen by Islamic Revolutionary Guard Corps forces during popular protests in Shahrak-e Moalem (Teacher's Town) Kermanshah, in front of her workplace shop and in the presence of her children. She was a mother of two young children and sold cosmetics and hygiene products. Her body was returned to the family after three days with a commitment to bury outside the city and refrain from holding a public funeral ceremony. Burial ceremony was held on 22 Dey month in Mileser village, Eslam Abad West.
