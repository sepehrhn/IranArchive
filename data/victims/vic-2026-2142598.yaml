description: Shot by a sniper positioned on the rooftop of the Ninth Qalam Mosque in the Ninth Qalam neighborhood (Shahin-Villa) of Karaj. The bullet struck his heart, and his lungs filled with blood. He was helping injured people when he was shot. More than 20 people were shot in the heart or chest area that day in the same neighborhood. He died at 9:58 PM after being taken to hospital. His body was released on January 10 but authorities did not allow burial in Karaj, so he was buried in his family's ancestral village, Owj in Qazvin on January 11. He worked in a boutique and loved to sing, dreaming of becoming famous.
