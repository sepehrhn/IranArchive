description: Shot with a war bullet by Islamic Republic agents in Sar-e Asiab area of Karaj during Friday protests on 19 Dey 1404. His family searched for him for six days until they found his body at the Legal Medicine Organization in Karaj on Thursday, 25 Dey 1404. The bullet had hit Milad's temple. IRGC Intelligence demanded one billion tomans as 'bullet fee' for handing over the body for burial, but the family could not afford to pay. Security forces also referred Milad's case to the Karaj Martyrs Foundation and introduced him as a government martyr in exchange for handing over the body to the family.
