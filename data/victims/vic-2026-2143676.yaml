description: 36-year-old Gilaki citizen from Tahergorab, resident of Islamshahr, injured on January 9, 2026 in Qaemiyeh area of Islamshahr by bullet or pellet. After injury, he returned home on foot but was transferred to hospital due to internal bleeding and underwent surgery. Doctor told family bleeding was controlled and condition stable. Next day family encountered intelligence forces at hospital and were only allowed brief ICU visit. Family says he was conscious and responsive. Access was then restricted and hours later they were told his condition was critical. Family noticed unusual surgical incision on his arm when receiving body that had not existed before and was sewn in abnormal manner. Family believes treatment process and post-surgical interventions involved serious ambiguities. Burial in Tahergorab faced pressure and restrictions.
