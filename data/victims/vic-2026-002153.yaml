description: |-
  Shot with three bullets while getting into a car at midnight on the first day of protests in the Jaber Ansari street area of Isfahan. Taken to a nearby clinic where doctor removed bullets from his leg but could not stop bleeding from main artery. Transferred to Gharazi Hospital. Security forces reportedly took all injured and killed people at dawn. Family received call after one week to collect his body. He was the only son and only remaining male member of his family.

  Persian Name: مهدی معصومی

  Shot three times while getting into a car in the Jaber Ansari street area of Isfahan on the night of the first day of the call. He was taken to a clinic, then to Gharazi Hospital. Security forces reportedly took him and other injured/deceased individuals in the early morning. His body was returned to his family after a week of no contact. He was the only son and the only surviving male in his family. The text mentions a possible narrative that he was followed after a gathering.
