description: Athlete and martial arts instructor. Killed on Friday during protests in Jannat Abad area with direct gunshot from regime forces' shotgun. Shot directly in the front of the chest. Pellets entered his windpipe causing lung bleeding and suffocation. About 50 to 60 pellets were found in his body from face down. He was a Kung Fu instructor with a very strong body. Had an 8-year-old son who kept asking why they won't show his father.
