description: |-
  20-year-old student, son of Zahra Bani Amerian. Shot with war bullets while in a private car in Gohardasht, Karaj on 19 Dey along with Bijan Mostafavi and his mother Zahra. Body was returned to their hometown Sonqor (Kermanshah province) two weeks prior and buried before dawn with security forces present, with no mourning ceremonies allowed.

  Student, shot by government forces while in personal car with family, vehicle was raked with bullets


  Shot and killed along with their parents, Bijan Mostafavi and his wife, while inside their personal vehicle during peaceful protests. Their bodies were transferred to Sanqor and buried under heavy security.
