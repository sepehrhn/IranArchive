description: Radiology specialist shot in the face by Iranian government forces in Malek Shahr, Isfahan. Died from her injuries at Gharazi Hospital after being transferred there. Her daughter and son in law, who were accompanying her, were also wounded and remain under intensive medical care. Iranian authorities pressured her family to bury her as a 'martyr' in the martyrs' section of Bagh Rezvan Cemetery, but her husband refused the request.
