description: Radiology specialist shot with pellet bullets while helping her daughter move dowry items in Malakshahr, Isfahan. Bullets hit her face and her daughter's and son-in-law's hands. All three were taken to Gharazi Hospital in Isfahan but Mona died within minutes of being admitted to emergency. She had reported severe burning sensation in her body and face during transport to hospital. Government officials offered to bury her as a 'martyr' in the martyrs' section of Bagh Rezvan cemetery, but her husband refused.
