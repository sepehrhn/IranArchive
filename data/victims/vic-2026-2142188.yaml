description: Baloch man from the city of Gasht in the central district of Saravan County who was living in Karaj for work. Killed during protests after being shot in the head with live ammunition by Iranian forces. Family identified his body after an extensive search at Alborz Hospital in Karaj. Authorities demanded around one billion tomans for the release of his body and pressured the family to state that he was a member of the Basij militia. The family rejected the claim, saying he had gone to Karaj solely to work as a laborer. His body was eventually buried on January 13 in his hometown of Gasht.
