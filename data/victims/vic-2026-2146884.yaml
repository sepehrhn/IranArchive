disappearance_circumstances: 18-year-old student and family breadwinner arrested by IRGC Intelligence Ministry forces during a nighttime raid on her family home on January 10, 2026. Her 12-year-old sister was also taken but released after interrogation, having experienced violent treatment and now in poor psychological condition. Fatemeh Zahra worked at a bakery while studying to support her family's expenses. She is of Bakhtiari ethnicity. Currently held in Dowlatabad Prison in Isfahan with unclear legal status after about 40 days. Heavy bail including property deed and gold demanded for temporary release, which the family cannot afford due to economic conditions.
