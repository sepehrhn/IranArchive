description: Shot by IRGC forces on Shiroudi Boulevard in front of Refah Bank. Bullet struck his left side, causing ruptured spleen and severe internal bleeding. Despite hospital being only 500 meters away, military forces prevented immediate transfer. Was first taken to Shiroud, then by ambulance to Ramsar Hospital. Died after approximately 3 hours, denied basic medical care including IV. 27 years old, single, worked as hairdresser, owned shop, car, motorcycle, and newly completed home.
