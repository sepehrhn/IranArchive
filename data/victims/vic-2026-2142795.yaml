description: Shot three times in the chest by security forces near Imam Hossein area on Daneshjo Boulevard near Midon. He was from Amirabab neighborhood (Enghelab Street) in Yazd. Lost his father in 2008. On Thursday night January 8th, he was taking his two sisters and mother home and was heading toward Imam Hossein when he was killed. Buried on Tuesday in block 2 of Rezvan Khaldbarin cemetery in Yazd.
