description: 17-year-old athlete from Tehran arrested on January 8, 2026 in the Narmak area. His lifeless body was delivered to his family a few days later. According to informed sources, signs of torture and jaw fractures were observed on the teenager's body, and the family was demanded payment for receiving the body. Reports indicate he was the second child of the family and was preparing as a wrestler to participate in provincial competitions. He was a motivated teenager with many dreams who joined the protests and lost his life under unclear circumstances after arrest.
