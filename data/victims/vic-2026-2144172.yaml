description: Shot by Islamic Republic snipers during popular protests in Fooladshahr on 18 Dey 1404. A bullet hit his head from above the rooftop and he was killed instantly. He was a 28-year-old welder, son of Ali-Mardan, of Bakhtiari ethnicity and resident of Fooladshahr. He mostly worked in Asaluyeh to earn his living. After his killing, his body was not delivered to the family for several days and they demanded 800 million tomans for the body's release. When the family could not afford to pay, they were forced to say that Farshid was a 'Basiji' to get his body back. His body was finally buried on 29 Dey in Fooladshahr.
