  47-year-old worker, father's name Mir Ali, company worker/supervisor of two children and elderly mother, died during the early hours of the call on the eighteenth (18 Dey)

  Abdolali Salimi was targeted by direct fire from security forces in the early hours of February 7, 2026 (18 Dey 1404) in Hashtgerd. 
  He was the guardian of two young children and his elderly mother.


  Worker at a company, head of two children and an elderly mother. Died on the 18th, early hours of the call. His two children will wait for their father forever.
