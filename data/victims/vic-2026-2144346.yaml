description: 32-year-old musician and computer science graduate who was shot during protests in Narmak neighborhood. Security forces were shooting from the top of Haft-Houz Narmak mosque toward the crowd. He was hit by a bullet, likely from there, targeting the eyebrow area and completely destroying his left eye. His body was identified through fingerprints after his father searched through morgues including Kahrizak. He was a guitarist, pianist and singer who had a music shop in Narmak.
