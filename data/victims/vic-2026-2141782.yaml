disappearance_circumstances: 33-year-old Kurdish man from Karzan in Ilam Province who was shot with shotgun pellets by security forces on Friday, 19 Dey 1404, during public protests. He was carrying his young child and crossing the street when he was directly targeted by suppressors. He was severely injured in both eyes and completely lost his sight. He is the breadwinner of his family and a simple worker. After 17 days from the injury, he still sees only darkness and general doctors have given up hope for treating his eyes. His family had to sell their sheep, which were their main source of income, to travel to Tehran and seek specialist medical opinion.
