description: Shot with pellets by IRGC forces at 8:30 PM on Basirat Street in Fooladshahr, Isfahan. He was alone when a motorcycle stopped beside him. Out of fear, he sat on the ground, pulled his hood over his head and said 'Please, for God's sake, don't hit me.' The forces placed their weapon on his back and shot him with pellets. More than 50 pellets entered his body, hitting his spinal cord and heart. His body was handed over to his family on the 26th and buried under security measures.
