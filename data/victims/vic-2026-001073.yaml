  Killed during protests, buried in Firouzan city, Nahavand


  A young man from Nahavand in Ferdows, Karaj. He was first shot with a hunting rifle when he went to rescue a wounded woman. While still attempting to help the injured person, he was directly hit by live ammunition and killed on the spot. He was buried in Firoozan, Nahavand.
