description: Shot directly in the head by a sniper with war bullets during popular protests in front of the 8th police station in Gohardasht. He was an athlete who worked at a sports club in Shahin Villa, Karaj, and rented the club's buffet to support himself and his mother. His father had died years ago and he was the sole breadwinner for the family. Security forces prevented public burial and he was buried in restrictive conditions in Soheylieh, Romandeh village without public ceremonies.
