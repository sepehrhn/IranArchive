# Human-readable title of the incident
title: "Kerman Soleimani Statue Protest Killings"

# Brief summary (1-2 sentences) for lists and previews
summary: "Witnesses and victim reporting indicate that security forces in Kerman opened fire on crowds trying to reach the Qassem Soleimani statue on January 8, 2026. Named victim documentation supports a conservative minimum of seven deaths in Kerman that day, while Iran International later reported that dozens may have been killed."

# Detailed narrative of the event. Supports Markdown.
narrative: |
  In Kerman, one of the clearest January 8 massacre patterns involved crowds trying to reach the Qassem Soleimani statue and being met with direct lethal force.

  Iran International's later investigation, based on eyewitnesses and medical staff, said security forces fired on protesters attempting to approach the statue and that local accounts described the city as a war zone. The same report said some protesters were ordered to salute Qassem Soleimani and shout pro-regime slogans while under armed pressure.

  Public victim documentation linked to the city supports the conclusion that the killings were not isolated. Among the named fatalities documented online for January 8 in Kerman are Danial Diyani, killed by gunshots to the eye and chest; Mehdi Khosravi, reportedly shot while bending down during the confrontation; and Milad Moazzami Goodarzi, whose comrades said he was hit by four bullets fired from the direction of the Soleimani statue. Additional Kerman victims dated January 8 are also present in the archive's victim collection, supporting a minimum of seven named deaths in the city that day.

  Because witness sources described far higher losses than the current named public list, the incident records a wider upper range while clearly separating documented minimums from broader estimates.

# Key claims made about the incident (that may or may not be verified yet)
key_claims:
  - "Security forces opened fire on crowds in Kerman attempting to approach the Qassem Soleimani statue on January 8, 2026."
  - "Some protesters were pressured or ordered to salute Soleimani while the crackdown unfolded."
  - "At least seven named fatalities from Kerman are currently documented for January 8 in archive-linked victim material."
  - "Witnesses and medical staff later said dozens may have been killed in Kerman."

# Open questions or missing information
open_questions:
  - "What exact route did protesters take from Azadi Square toward the Soleimani statue?"
  - "Were rooftop or elevated firing positions used in addition to street-level fire?"
  - "How many of the wounded were treated in hospitals, and how many avoided treatment out of fear of arrest?"
  - "Can the current minimum victim list for January 8 Kerman be expanded with full names, ages, and neighborhoods?"

# Limitations of the current report (e.g. lack of video, biased sources)
limitations:
  - "The gap between the documented named-victim minimum and witness estimates remains substantial."
  - "The internet blackout and fear of retaliation limited the publication of contemporaneous footage from Kerman."
  - "Several supporting victim sources are social-media based and require ongoing preservation."

