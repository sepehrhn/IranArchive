# Human-readable title of the incident
title: "Shoora Square Shootings and Coerced Burial in Arak"

# Brief summary (1-2 sentences) for lists and previews
summary: "Security forces repeatedly used live ammunition around Shoora Square (Bagh-e Melli) in Arak on January 8-9, 2026. Named victim reporting documents at least two fatalities on January 8 there, and Iran Human Rights later detailed how Mohammad Ranjbar Hosseinabadi was shot on January 9 and buried at 4:30 a.m. under guard after his family was extorted and threatened."

# Detailed narrative of the event. Supports Markdown.
narrative: |
  Shoora Square, also known as Bagh-e Melli, became a lethal focal point of repression in Arak during the January 8-9 massacre.

  Public victim documentation already in circulation online records at least two January 8 killings tied directly to Shoora Square: Amir-Mahdi Nemati-Nezhad, age 17, and Ehsan Akbari, age 27. Ehsan Akbari's case is particularly detailed in family and activist reporting, which says he was first hit with birdshot and then shot with live ammunition from the roof of his former school after going to the area.

  Iran Human Rights later published a fuller reconstruction of events on January 9 involving Mohammad Ranjbar Hosseinabadi, who joined a crowd at Shoora Square and was shot three times in the chest and abdomen within minutes. Because of the intensity of gunfire, bystanders could not reach him and security forces removed his wounded body themselves.

  The repression continued after death. According to the family account relayed by IHR, officials would only release Ranjbar Hosseinabadi's body if the family signed a statement falsely presenting him as a Basiji and paid 600 million tomans in cash. After refusing the false statement but eventually paying the money, the family was forced to bury him at 4:30 a.m. on January 15 in the presence of 13 security personnel and only three relatives, under threats of arrest and confiscation of his property.

  This combination of street killing, removal of the wounded by security forces, coercive body release, and forced predawn burial makes Arak one of the clearest documented examples of both lethal force and postmortem intimidation during the January 8-9 crackdown.

# Key claims made about the incident (that may or may not be verified yet)
key_claims:
  - "Security forces used live ammunition against crowds at Shoora Square in Arak on January 8 and 9, 2026."
  - "Amir-Mahdi Nemati-Nezhad and Ehsan Akbari were among the people killed in or around Shoora Square on January 8."
  - "Mohammad Ranjbar Hosseinabadi was shot on January 9 at Shoora Square and his wounded body was removed by security forces."
  - "Authorities conditioned the release of Mohammad Ranjbar Hosseinabadi's body on money and a false declaration that he was a Basiji."

# Open questions or missing information
open_questions:
  - "How many additional January 8 victims from Shoora Square remain unidentified or undocumented in public sources?"
  - "Which security body controlled the square and the later coercive burial process?"
  - "What hospital or medical facility first received the wounded from Shoora Square on January 8-9?"
  - "Can ballistic or video evidence establish whether the same firing positions were used on both days?"

# Limitations of the current report (e.g. lack of video, biased sources)
limitations:
  - "The confirmed minimum is built from victim-specific reporting and likely understates the total number of people shot in the square."
  - "Open-source documentation remains fragmentary because of the January blackout and fear among families."
  - "Some supporting victim reporting survives mainly through activist and family internet posts rather than formal records."

