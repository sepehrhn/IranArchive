# Human-readable title of the incident
title: "Live-Fire Crackdown in Kermanshah on January 8-9"

# Brief summary (1-2 sentences) for lists and previews
summary: "Verified video and witness evidence show security forces using live ammunition, violent arrests, and heavy intimidation in Kermanshah on January 8-9, 2026. Amnesty documented unlawful force in Kermanshah city, while later Kurdish-rights reporting counted at least 45 deaths in the province."

# Detailed narrative of the event. Supports Markdown.
narrative: |
  Kermanshah was one of the most violently repressed urban centers during the January 8-9, 2026 massacre.

  Amnesty International said eyewitness testimony and verified audiovisual material from January 8 and 9 showed security forces in Kermanshah province, including Kermanshah city, unlawfully using firearms and other prohibited weapons against protesters. In one verified video from January 8, uniformed and plainclothes forces were visible around Golha Boulevard and nearby streets while protesters rushed to help people wounded on the ground; the person filming shouted that security forces had killed two people.

  Additional reporting from Kurdish human-rights sources later described Kermanshah as one of the deadliest provinces of the crackdown, with many victims shot by direct live fire in districts including Dareh Deraz, Maskan, Dolatabad, and Jafarabad. Taken together, the material supports the core conclusion that the state response in Kermanshah was not crowd control but lethal repression.

  Because internet and phone shutdowns began on January 8, the full citywide toll remains contested. The archive therefore records a conservative minimum alongside a wider upper range drawn from later human-rights reporting.

# Key claims made about the incident (that may or may not be verified yet)
key_claims:
  - "Security forces used live ammunition against protesters in Kermanshah on January 8 and 9, 2026."
  - "Verified video from January 8 shows at least two badly wounded or killed people on the ground near Golha Boulevard while armed forces remain in control of the street."
  - "Plainclothes and uniformed forces jointly carried out arrests and intimidation in Kermanshah city."
  - "Later Kurdish-rights documentation put the death toll in Kermanshah province at at least 45."

# Open questions or missing information
open_questions:
  - "What is the city-only death toll for Kermanshah, as distinct from the wider province?"
  - "Which units were deployed in each neighborhood: FARAJA special units, Basij, IRGC, or mixed plainclothes teams?"
  - "How many people were taken into detention from Golha Boulevard and nearby streets on January 8?"
  - "Can additional videos from Dareh Deraz and Maskan be geolocated and timestamped?"

# Limitations of the current report (e.g. lack of video, biased sources)
limitations:
  - "The province-wide death range is assembled from later human-rights reporting and cannot yet be fully disaggregated by city and neighborhood."
  - "The internet blackout sharply reduced contemporaneous documentation from inside Kermanshah."
  - "Some local victim documentation exists only through activist networks and social media rather than hospital or forensic records."

