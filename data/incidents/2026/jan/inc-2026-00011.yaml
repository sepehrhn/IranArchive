# Human-readable title of the incident
title: "Ardabil Medical Shelter Raids After the January 8-9 Crackdown"

# Brief summary (1-2 sentences) for lists and previews
summary: "After the January 8-9 killings in Ardabil, security forces allegedly targeted doctors and volunteer first responders who treated wounded protesters outside formal medical facilities. Human-rights reporting says at least four doctors were arrested and a volunteer shelter treating more than 20 wounded people was raided on January 14."

# Detailed narrative of the event. Supports Markdown.
narrative: |
  Ardabil appears to have been one of the cities where the state response on January 8 and 9, 2026 was so severe that wounded people could no longer safely rely on normal medical channels.

  Iran Human Rights reported that the situation in Ardabil on those two days was extremely critical and relayed an estimate that at least 50 people may have been killed in the city. The same report said at least four doctors were arrested for helping wounded protesters and described the case of a volunteer first responder, identified as Kh. M., who turned his home into an improvised shelter for more than 20 injured people.

  According to that account, security forces raided the house on January 14, arrested Kh. M. after a severe beating, smashed windows, and destroyed his car and parts of the home. Two of the wounded patients reportedly later died there because of the severity of their injuries.

  Separate international reporting on the wider crackdown against medical workers corroborates the broader pattern. Le Monde, citing medical sources, reported the arrest in Ardabil of dermatologist Dr. Ameneh Soleimani, while Amnesty documented attacks on health workers and interference with treatment during and after the January massacre.

  The city-specific shelter details remain dependent largely on one human-rights reporting channel, so this incident is retained as not verified pending stronger independent corroboration, even though the broader pattern of medical repression is well supported.

# Key claims made about the incident (that may or may not be verified yet)
key_claims:
  - "At least four doctors in Ardabil were arrested for treating wounded protesters after the January 8-9 crackdown."
  - "A volunteer first responder turned his home into a shelter for more than 20 wounded people."
  - "Security forces raided that shelter on January 14, beat the volunteer, and destroyed property."
  - "At least 50 people may have been killed in Ardabil on January 8-9, though that number remains unverified."

# Open questions or missing information
open_questions:
  - "What are the names and current legal status of the four doctors reported arrested in Ardabil?"
  - "Can the identity and fate of Kh. M. be independently confirmed?"
  - "Were the more than 20 wounded treated in the shelter all victims of January 8-9 gunfire?"
  - "Is there independent hospital, cemetery, or morgue evidence that clarifies the real Ardabil death toll?"

# Limitations of the current report (e.g. lack of video, biased sources)
limitations:
  - "The most detailed city-specific information comes primarily from one Iran Human Rights report relaying informed sources."
  - "The reported estimate of at least 50 deaths in Ardabil has not been independently confirmed in open sources reviewed for this draft."
  - "Much of the documentation concerns the aftermath of the January 8-9 violence rather than contemporaneous footage of the killings themselves."

