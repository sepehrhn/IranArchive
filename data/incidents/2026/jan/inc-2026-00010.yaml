# Human-readable title of the incident
title: "Yazdanshahr Live-Fire Killings and Machine-Gun Fire"

# Brief summary (1-2 sentences) for lists and previews
summary: "Security forces used sustained live fire in Yazdanshahr on January 9, reportedly shooting at rooftops, pedestrians, and shopkeepers as well as protesters. Named victim documentation and reporting center on the killing of Soheil Zilabi on Motahari Boulevard and indicate at least five fatalities in the city on that date."

# Detailed narrative of the event. Supports Markdown.
narrative: |
  Yazdanshahr in Isfahan province moved from visible street confrontation to mass bloodshed over several days in early January 2026.

  Iran International reported on January 6 that protesters in Yazdanshahr were already facing gunfire and the deployment of military-style vehicles. Iran Human Rights later published a detailed account describing Friday, January 9 as the decisive massacre day: a resident said security forces opened automatic fire without mercy, including at people on rooftops, pedestrians, and shopkeepers, and that bodies remained in the streets by the next morning.

  The case of Soheil Zilabi, age 24, provides a well-documented focal point inside this broader incident. Victim documentation compiled from multiple public internet sources states that he was shot in the head on Motahari Boulevard, transferred to Fateme Alzahra Hospital, and died later that night. His body was reportedly returned to the family only after a delay of several days.

  The archive's victim collection currently identifies five named fatalities with January 9 dates in Yazdanshahr during this wave of violence, supporting the use of a conservative fatality minimum for the incident. BBC Persian reporting republished by Yahoo also said footage from Yazdanshahr showed protesters coming under sustained machine-gun fire on January 9.

# Key claims made about the incident (that may or may not be verified yet)
key_claims:
  - "Security forces used automatic weapons and sustained live fire in Yazdanshahr on January 9, 2026."
  - "People on rooftops, pedestrians, and shopkeepers were also targeted during the crackdown."
  - "Soheil Zilabi was shot in the head on Motahari Boulevard and died at Fateme Alzahra Hospital the same night."
  - "At least five named fatalities from Yazdanshahr are currently documented for January 9 in archive-linked victim material."

# Open questions or missing information
open_questions:
  - "What was the full death toll in Yazdanshahr between the evening of January 9 and the following morning?"
  - "Which exact units were firing from street level and which were positioned on rooftops?"
  - "Can the available videos be geolocated to specific blocks along Motahari Boulevard and other streets?"
  - "How many of the wounded avoided hospitals because of fear of arrest?"

# Limitations of the current report (e.g. lack of video, biased sources)
limitations:
  - "The upper-range fatality estimate is still witness-based and not fully matched to a complete public victim list."
  - "Much of the contemporaneous documentation surfaced after the blackout eased, limiting minute-by-minute reconstruction."
  - "Some victim-level internet sources are social-media based and require continued preservation and archiving."

